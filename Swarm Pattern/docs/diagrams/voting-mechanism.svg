<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <!-- Gradients -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="approveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="rejectGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5576c"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="abstainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="proposalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#667eea"/>
    </linearGradient>
    <linearGradient id="calcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e94560"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f5576c"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="600" fill="#0f0f23"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#titleGrad)">Consensus Voting Mechanism</text>
  <text x="450" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Data-Driven Agent Voting with Score Thresholds</text>
  
  <!-- Proposal input box -->
  <g filter="url(#shadow)" transform="translate(325, 75)">
    <rect width="250" height="60" rx="12" fill="#1a1a2e" stroke="url(#proposalGrad)" stroke-width="2"/>
    <text x="125" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#a855f7">📝 TRADE PROPOSAL</text>
    <text x="125" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">From: Best scoring agent</text>
  </g>
  
  <!-- Arrow: Proposal to Voting -->
  <path d="M 450 140 L 450 170" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowPurple)"/>
  
  <!-- Voting Grid Container -->
  <g filter="url(#shadow)" transform="translate(50, 175)">
    <rect width="800" height="175" rx="12" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>
    <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">🗳️ DATA-DRIVEN VOTING (Score 0-100)</text>
    
    <!-- Market Analysis Agent -->
    <g transform="translate(30, 45)">
      <rect width="140" height="110" rx="8" fill="#2d2d44" stroke="url(#approveGrad)" stroke-width="2"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#43e97b">📈 Market Analysis</text>
      <text x="70" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">80</text>
      <rect x="25" y="80" width="90" height="22" rx="4" fill="#2d3a2d"/>
      <text x="70" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43e97b">✅ APPROVE</text>
    </g>
    
    <!-- Risk Assessment Agent -->
    <g transform="translate(185, 45)">
      <rect width="140" height="110" rx="8" fill="#2d2d44" stroke="url(#approveGrad)" stroke-width="2"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#43e97b">⚠️ Risk Assessment</text>
      <text x="70" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">72</text>
      <rect x="25" y="80" width="90" height="22" rx="4" fill="#2d3a2d"/>
      <text x="70" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43e97b">✅ APPROVE</text>
    </g>
    
    <!-- Tax Strategy Agent -->
    <g transform="translate(340, 45)">
      <rect width="140" height="110" rx="8" fill="#2d2d44" stroke="url(#abstainGrad)" stroke-width="2"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffd93d">💰 Tax Strategy</text>
      <text x="70" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">65</text>
      <rect x="25" y="80" width="90" height="22" rx="4" fill="#3a3a2d"/>
      <text x="70" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffd93d">⏸️ ABSTAIN</text>
    </g>
    
    <!-- ESG Compliance Agent -->
    <g transform="translate(495, 45)">
      <rect width="140" height="110" rx="8" fill="#2d2d44" stroke="url(#rejectGrad)" stroke-width="2"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f5576c">🌱 ESG Compliance</text>
      <text x="70" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">45</text>
      <rect x="25" y="80" width="90" height="22" rx="4" fill="#3a2d2d"/>
      <text x="70" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f5576c">❌ REJECT</text>
    </g>
    
    <!-- Algo Trading Agent -->
    <g transform="translate(650, 45)">
      <rect width="140" height="110" rx="8" fill="#2d2d44" stroke="url(#approveGrad)" stroke-width="2"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#43e97b">🤖 Algo Trading</text>
      <text x="70" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff">78</text>
      <rect x="25" y="80" width="90" height="22" rx="4" fill="#2d3a2d"/>
      <text x="70" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43e97b">✅ APPROVE</text>
    </g>
  </g>
  
  <!-- Arrow: Voting to Calculation -->
  <path d="M 450 355 L 450 385" stroke="#e94560" stroke-width="2" marker-end="url(#arrowPink)"/>
  
  <!-- Consensus Calculation Box -->
  <g filter="url(#shadow)" transform="translate(175, 390)">
    <rect width="550" height="90" rx="12" fill="#1a1a2e" stroke="url(#calcGrad)" stroke-width="2"/>
    <text x="275" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4facfe">📊 CONSENSUS CALCULATION</text>
    <text x="275" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Approvals: 3/5 (60%) | Threshold: 60%</text>
    <text x="275" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#43e97b">✅ Result: CONSENSUS REACHED</text>
  </g>
  
  <!-- Rejection Feedback Box -->
  <g filter="url(#shadow)" transform="translate(50, 500)">
    <rect width="350" height="70" rx="10" fill="#1a1a2e" stroke="url(#rejectGrad)" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="175" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f5576c">🔄 REJECTION FEEDBACK LOOP</text>
    <text x="175" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Rejecting agents' rationales passed to next iteration</text>
  </g>
  
  <!-- Arrow: ESG to Feedback -->
  <path d="M 595 330 L 595 380 L 400 380 L 400 420 L 225 420 L 225 495" stroke="#f5576c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  
  <!-- Score Thresholds Legend -->
  <g filter="url(#shadow)" transform="translate(500, 500)">
    <rect width="350" height="70" rx="10" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
    <text x="175" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">Score Thresholds</text>
    
    <rect x="25" y="38" width="80" height="22" rx="4" fill="#2d3a2d"/>
    <text x="65" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#43e97b">≥70: Approve</text>
    
    <rect x="130" y="38" width="90" height="22" rx="4" fill="#3a3a2d"/>
    <text x="175" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffd93d">60-69: Abstain</text>
    
    <rect x="245" y="38" width="80" height="22" rx="4" fill="#3a2d2d"/>
    <text x="285" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f5576c">&lt;60: Reject</text>
  </g>
  
  <!-- Version -->
  <text x="850" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#444">v2.0 - Voting Mechanism</text>
</svg>
