<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <!-- Gradients -->
    <linearGradient id="marketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="riskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="taxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="esgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="tradingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="busGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9966"/>
      <stop offset="100%" style="stop-color:#ff5e62"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="700" fill="#0f0f23"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff">Agent Communication &amp; Interaction Model</text>
  <text x="500" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">Publish-Subscribe Pattern via Communication Bus</text>
  
  <!-- Communication Bus (Center) -->
  <g filter="url(#shadow)">
    <ellipse cx="500" cy="350" rx="120" ry="60" fill="#1a1a2e" stroke="url(#busGrad)" stroke-width="3"/>
    <text x="500" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff9966">📡 Communication</text>
    <text x="500" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff9966">Bus</text>
    <text x="500" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">Message Routing &amp; History</text>
  </g>
  
  <!-- Market Analysis Agent (Top) -->
  <g filter="url(#shadow)" transform="translate(400, 100)">
    <rect width="200" height="100" rx="15" fill="#1a1a2e" stroke="url(#marketGrad)" stroke-width="2"/>
    <text x="100" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#43e97b">📈 Market Analysis</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#2d2d44" stroke-width="1"/>
    <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Valuations &amp; Trends</text>
    <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Sector Analysis</text>
  </g>
  
  <!-- Risk Assessment Agent (Top-Left) -->
  <g filter="url(#shadow)" transform="translate(80, 220)">
    <rect width="200" height="100" rx="15" fill="#1a1a2e" stroke="url(#riskGrad)" stroke-width="2"/>
    <text x="100" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fa709a">⚠️ Risk Assessment</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#2d2d44" stroke-width="1"/>
    <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Compliance &amp; VaR</text>
    <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Position Limits</text>
  </g>
  
  <!-- Tax Strategy Agent (Top-Right) -->
  <g filter="url(#shadow)" transform="translate(720, 220)">
    <rect width="200" height="100" rx="15" fill="#1a1a2e" stroke="url(#taxGrad)" stroke-width="2"/>
    <text x="100" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#667eea">💰 Tax Strategy</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#2d2d44" stroke-width="1"/>
    <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Tax Lot Optimization</text>
    <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Gain/Loss Analysis</text>
  </g>
  
  <!-- ESG Compliance Agent (Bottom-Left) -->
  <g filter="url(#shadow)" transform="translate(80, 450)">
    <rect width="200" height="100" rx="15" fill="#1a1a2e" stroke="url(#esgGrad)" stroke-width="2"/>
    <text x="100" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">🌱 ESG Compliance</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#2d2d44" stroke-width="1"/>
    <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">ESG Scoring</text>
    <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Sustainability Metrics</text>
  </g>
  
  <!-- Algorithmic Trading Agent (Bottom-Right) -->
  <g filter="url(#shadow)" transform="translate(720, 450)">
    <rect width="200" height="100" rx="15" fill="#1a1a2e" stroke="url(#tradingGrad)" stroke-width="2"/>
    <text x="100" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4facfe">🤖 Algo Trading</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#2d2d44" stroke-width="1"/>
    <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Execution Planning</text>
    <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Liquidity Analysis</text>
  </g>
  
  <!-- Connection lines (bidirectional) -->
  <!-- Market to Bus -->
  <line x1="500" y1="200" x2="500" y2="290" stroke="#43e97b" stroke-width="2" opacity="0.7"/>
  <circle cx="500" cy="245" r="5" fill="#43e97b"/>
  
  <!-- Risk to Bus -->
  <line x1="280" y1="270" x2="385" y2="330" stroke="#fa709a" stroke-width="2" opacity="0.7"/>
  <circle cx="332" cy="300" r="5" fill="#fa709a"/>
  
  <!-- Tax to Bus -->
  <line x1="720" y1="270" x2="615" y2="330" stroke="#667eea" stroke-width="2" opacity="0.7"/>
  <circle cx="667" cy="300" r="5" fill="#667eea"/>
  
  <!-- ESG to Bus -->
  <line x1="280" y1="500" x2="390" y2="390" stroke="#f093fb" stroke-width="2" opacity="0.7"/>
  <circle cx="335" cy="445" r="5" fill="#f093fb"/>
  
  <!-- Trading to Bus -->
  <line x1="720" y1="500" x2="610" y2="390" stroke="#4facfe" stroke-width="2" opacity="0.7"/>
  <circle cx="665" cy="445" r="5" fill="#4facfe"/>
  
  <!-- Message Types Legend -->
  <g transform="translate(50, 580)">
    <rect width="900" height="100" rx="10" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
    <text x="450" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">Message Types &amp; Communication Flow</text>
    
    <!-- Analysis -->
    <rect x="30" y="45" width="160" height="40" rx="8" fill="#2d2d44" stroke="#43e97b" stroke-width="1"/>
    <text x="110" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43e97b">📊 ANALYSIS</text>
    <text x="110" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">Findings + Conviction</text>
    
    <!-- Debate -->
    <rect x="210" y="45" width="160" height="40" rx="8" fill="#2d2d44" stroke="#fa709a" stroke-width="1"/>
    <text x="290" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fa709a">💬 DEBATE</text>
    <text x="290" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">Concerns + Challenges</text>
    
    <!-- Proposal -->
    <rect x="390" y="45" width="160" height="40" rx="8" fill="#2d2d44" stroke="#667eea" stroke-width="1"/>
    <text x="470" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#667eea">📝 PROPOSAL</text>
    <text x="470" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">Trade Plan + Rationale</text>
    
    <!-- Vote -->
    <rect x="570" y="45" width="160" height="40" rx="8" fill="#2d2d44" stroke="#f093fb" stroke-width="1"/>
    <text x="650" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f093fb">🗳️ VOTE</text>
    <text x="650" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">Approve/Reject + Score</text>
    
    <!-- Broadcast -->
    <rect x="750" y="45" width="130" height="40" rx="8" fill="#2d2d44" stroke="#4facfe" stroke-width="1"/>
    <text x="815" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4facfe">📢 BROADCAST</text>
    <text x="815" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">To all agents</text>
  </g>
  
  <!-- Version -->
  <text x="950" y="690" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#444">v2.0 - Agent Interaction Model</text>
</svg>
