<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" width="1400" height="1100">
  <defs>
    <!-- Gradients -->
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5576c"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="phaseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#888"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#43e97b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f5576c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4facfe"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#fee140"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="1100" fill="#0f0f23"/>
  
  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#startGrad)">Portfolio Optimization Flow</text>
  <text x="700" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#888">Swarm Pattern - Iterative Consensus Process</text>
  
  <!-- Phase labels on the right -->
  <g transform="translate(1200, 150)">
    <rect x="0" y="0" width="150" height="40" rx="8" fill="#1a1a2e" stroke="#667eea" stroke-width="1"/>
    <text x="75" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#667eea">PHASE 1: INPUT</text>
    
    <rect x="0" y="200" width="150" height="40" rx="8" fill="#1a1a2e" stroke="#4facfe" stroke-width="1"/>
    <text x="75" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4facfe">PHASE 2: ANALYSIS</text>
    
    <rect x="0" y="350" width="150" height="40" rx="8" fill="#1a1a2e" stroke="#f093fb" stroke-width="1"/>
    <text x="75" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f093fb">PHASE 3: DEBATE</text>
    
    <rect x="0" y="500" width="150" height="40" rx="8" fill="#1a1a2e" stroke="#fee140" stroke-width="1"/>
    <text x="75" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fee140">PHASE 4: PROPOSALS</text>
    
    <rect x="0" y="650" width="150" height="40" rx="8" fill="#1a1a2e" stroke="#43e97b" stroke-width="1"/>
    <text x="75" y="675" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#43e97b">PHASE 5: VOTING</text>
  </g>
  
  <!-- START Node -->
  <g filter="url(#shadow)" transform="translate(300, 100)">
    <ellipse cx="100" cy="30" rx="80" ry="30" fill="url(#startGrad)"/>
    <text x="100" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">🚀 START</text>
  </g>
  
  <!-- Arrow: Start to Input -->
  <path d="M 400 160 L 400 190" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- User Input Box -->
  <g filter="url(#shadow)" transform="translate(200, 195)">
    <rect width="400" height="80" rx="10" fill="#1a1a2e" stroke="#667eea" stroke-width="2"/>
    <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#667eea">📥 User Input</text>
    <text x="200" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Portfolio data (CSV/JSON/Text)</text>
    <text x="200" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Strategy selection + Configuration</text>
  </g>
  
  <!-- Arrow: Input to Compliance Check -->
  <path d="M 400 280 L 400 310" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Compliance Check Decision -->
  <g filter="url(#shadow)" transform="translate(295, 315)">
    <polygon points="105,0 210,50 105,100 0,50" fill="#1a1a2e" stroke="url(#decisionGrad)" stroke-width="2"/>
    <text x="105" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fa709a">Initial</text>
    <text x="105" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fa709a">Violations?</text>
  </g>
  
  <!-- Yes path from compliance - warning box -->
  <g filter="url(#shadow)" transform="translate(600, 340)">
    <rect width="250" height="50" rx="8" fill="#1a1a2e" stroke="#f5576c" stroke-width="2"/>
    <text x="125" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f5576c">⚠️ Log violations, continue</text>
  </g>
  <path d="M 505 365 L 590 365" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="545" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f5576c">Yes</text>
  
  <!-- Arrow from warning to main flow -->
  <path d="M 725 390 L 725 420 L 400 420 L 400 440" stroke="#888" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  
  <!-- Arrow: No violations - continue -->
  <path d="M 400 420 L 400 440" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="380" y="432" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#43e97b">No</text>
  
  <!-- Iteration Loop Box -->
  <g filter="url(#shadow)" transform="translate(50, 450)">
    <rect width="1050" height="460" rx="12" fill="none" stroke="#4facfe" stroke-width="2" stroke-dasharray="10,5"/>
    <text x="30" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4facfe">🔄 ITERATION LOOP (1 to max_iterations)</text>
  </g>
  
  <!-- Phase 2: Parallel Analysis -->
  <g filter="url(#shadow)" transform="translate(200, 480)">
    <rect width="400" height="90" rx="10" fill="#1a1a2e" stroke="url(#processGrad)" stroke-width="2"/>
    <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4facfe">🔍 Parallel Analysis</text>
    <text x="200" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">All 5 agents analyze portfolio independently</text>
    
    <!-- Mini agent icons -->
    <rect x="40" y="60" width="60" height="20" rx="4" fill="#2d2d44"/>
    <text x="70" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#43e97b">Market</text>
    
    <rect x="110" y="60" width="50" height="20" rx="4" fill="#2d2d44"/>
    <text x="135" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fa709a">Risk</text>
    
    <rect x="170" y="60" width="50" height="20" rx="4" fill="#2d2d44"/>
    <text x="195" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#667eea">Tax</text>
    
    <rect x="230" y="60" width="50" height="20" rx="4" fill="#2d2d44"/>
    <text x="255" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f093fb">ESG</text>
    
    <rect x="290" y="60" width="60" height="20" rx="4" fill="#2d2d44"/>
    <text x="320" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4facfe">Trading</text>
  </g>
  
  <!-- Arrow: Analysis to First Iteration Check -->
  <path d="M 400 575 L 400 600" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- First Iteration Check -->
  <g filter="url(#shadow)" transform="translate(295, 605)">
    <polygon points="105,0 210,45 105,90 0,45" fill="#1a1a2e" stroke="url(#decisionGrad)" stroke-width="2"/>
    <text x="105" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fa709a">Iteration</text>
    <text x="105" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fa709a">&gt; 1?</text>
  </g>
  
  <!-- Yes: Debate Phase -->
  <g filter="url(#shadow)" transform="translate(600, 620)">
    <rect width="350" height="60" rx="10" fill="#1a1a2e" stroke="#f093fb" stroke-width="2"/>
    <text x="175" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f093fb">💬 Inter-Agent Debate</text>
    <text x="175" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Agents exchange concerns &amp; challenge each other</text>
  </g>
  <path d="M 505 650 L 590 650" stroke="#fee140" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="545" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fee140">Yes</text>
  
  <!-- Arrow from debate merging back -->
  <path d="M 775 680 L 775 710 L 400 710" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- No: Skip to proposals -->
  <path d="M 400 695 L 400 725" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="375" y="715" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#43e97b">No (skip)</text>
  
  <!-- Phase 4: Proposal Generation -->
  <g filter="url(#shadow)" transform="translate(200, 730)">
    <rect width="400" height="60" rx="10" fill="#1a1a2e" stroke="#fee140" stroke-width="2"/>
    <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fee140">📝 Collect Proposals</text>
    <text x="200" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Each agent proposes trade plan based on analysis</text>
  </g>
  
  <!-- Arrow: Proposals to Best Selection -->
  <path d="M 400 795 L 400 815" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Select Best Proposal -->
  <g filter="url(#shadow)" transform="translate(200, 820)">
    <rect width="400" height="50" rx="10" fill="#1a1a2e" stroke="#4facfe" stroke-width="2"/>
    <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4facfe">🏆 Select Best Proposal (by conviction score)</text>
  </g>
  
  <!-- Arrow to Voting -->
  <path d="M 400 875 L 400 895" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Phase 5: Voting Box -->
  <g filter="url(#shadow)" transform="translate(700, 470)">
    <rect width="350" height="130" rx="10" fill="#1a1a2e" stroke="url(#successGrad)" stroke-width="2"/>
    <text x="175" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#43e97b">🗳️ Voting Phase</text>
    <text x="175" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">All agents vote on best proposal</text>
    
    <!-- Vote options -->
    <rect x="30" y="65" width="90" height="25" rx="5" fill="#2d3a2d"/>
    <text x="75" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43e97b">✅ APPROVE</text>
    
    <rect x="130" y="65" width="90" height="25" rx="5" fill="#3a2d2d"/>
    <text x="175" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f5576c">❌ REJECT</text>
    
    <rect x="230" y="65" width="90" height="25" rx="5" fill="#3a3a2d"/>
    <text x="275" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fee140">⏸️ ABSTAIN</text>
    
    <text x="175" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#888">Calculate approval rate (%)</text>
  </g>
  
  <!-- Arrow from best to voting -->
  <path d="M 600 845 L 875 845 L 875 600" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Consensus Check Decision -->
  <g filter="url(#shadow)" transform="translate(110, 920)">
    <polygon points="150,0 300,55 150,110 0,55" fill="#1a1a2e" stroke="url(#decisionGrad)" stroke-width="2"/>
    <text x="150" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fa709a">Consensus</text>
    <text x="150" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fa709a">Reached?</text>
    <text x="150" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">(≥ threshold)</text>
  </g>
  
  <!-- Yes: Success -->
  <g filter="url(#shadow)" transform="translate(500, 940)">
    <rect width="250" height="70" rx="10" fill="#1a1a2e" stroke="url(#successGrad)" stroke-width="2"/>
    <text x="125" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#43e97b">✅ CONSENSUS!</text>
    <text x="125" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Return approved trade plan</text>
  </g>
  <path d="M 410 975 L 490 975" stroke="#43e97b" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="450" y="965" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#43e97b">Yes</text>
  
  <!-- No: Check max iterations -->
  <g filter="url(#shadow)" transform="translate(810, 920)">
    <polygon points="110,0 220,55 110,110 0,55" fill="#1a1a2e" stroke="url(#decisionGrad)" stroke-width="2"/>
    <text x="110" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fa709a">Max</text>
    <text x="110" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fa709a">Iterations?</text>
  </g>
  <path d="M 260 1030 L 260 1060 L 920 1060 L 920 1030" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="260" y="1050" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#f5576c">No</text>
  
  <!-- No: Loop back -->
  <path d="M 920 920 L 920 480 L 610 480" stroke="#4facfe" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>
  <text x="930" y="700" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4facfe">No → Next Iteration</text>
  
  <!-- Yes (Max Reached): Fallback -->
  <g filter="url(#shadow)" transform="translate(1050, 940)">
    <rect width="200" height="70" rx="10" fill="#1a1a2e" stroke="url(#failGrad)" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f5576c">⚠️ FALLBACK</text>
    <text x="100" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Use conservative strategy</text>
  </g>
  <path d="M 1030 975 L 1040 975" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="1025" y="963" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#f5576c">Yes</text>
  
  <!-- End nodes -->
  <g filter="url(#shadow)" transform="translate(540, 1030)">
    <ellipse cx="85" cy="25" rx="70" ry="25" fill="url(#successGrad)"/>
    <text x="85" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">🏁 END</text>
  </g>
  <path d="M 625 1010 L 625 1030" stroke="#43e97b" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <g filter="url(#shadow)" transform="translate(1100, 1030)">
    <ellipse cx="50" cy="25" rx="50" ry="25" fill="url(#failGrad)"/>
    <text x="50" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">🏁 END</text>
  </g>
  <path d="M 1150 1010 L 1150 1030" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>
  
  <!-- Legend -->
  <g transform="translate(50, 85)">
    <rect width="180" height="100" rx="8" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#888">LEGEND</text>
    
    <rect x="10" y="30" width="30" height="15" rx="4" fill="#1a1a2e" stroke="#4facfe" stroke-width="1"/>
    <text x="50" y="42" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Process</text>
    
    <polygon points="25,60 40,68 25,76 10,68" fill="#1a1a2e" stroke="#fa709a" stroke-width="1"/>
    <text x="50" y="72" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Decision</text>
    
    <ellipse cx="25" cy="87" rx="15" ry="8" fill="#667eea"/>
    <text x="50" y="90" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Start/End</text>
  </g>
  
  <!-- Version -->
  <text x="1350" y="1080" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#444">v2.0 - Optimization Flow Chart</text>
</svg>
