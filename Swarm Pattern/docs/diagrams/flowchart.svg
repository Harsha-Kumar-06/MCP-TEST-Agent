<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1200" width="1000" height="1200">
  <defs>
    <!-- Gradients -->
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5576c"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#888"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#43e97b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f5576c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4facfe"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#fee140"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="1200" fill="#0f0f23"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="url(#startGrad)">Portfolio Optimization Flow</text>
  <text x="500" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#888">Swarm Pattern - Iterative Consensus Process</text>
  
  <!-- Legend -->
  <g transform="translate(780, 80)">
    <rect width="180" height="100" rx="8" fill="#1a1a2e" stroke="#444" stroke-width="1"/>
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#888">LEGEND</text>
    <rect x="10" y="32" width="30" height="15" rx="4" fill="#1a1a2e" stroke="#4facfe" stroke-width="1"/>
    <text x="50" y="44" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Process</text>
    <polygon points="25,62 40,70 25,78 10,70" fill="#1a1a2e" stroke="#fa709a" stroke-width="1"/>
    <text x="50" y="74" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Decision</text>
    <ellipse cx="25" cy="90" rx="15" ry="8" fill="#667eea"/>
    <text x="50" y="94" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Start/End</text>
  </g>
  
  <!-- START Node -->
  <g filter="url(#shadow)" transform="translate(400, 80)">
    <ellipse cx="100" cy="25" rx="75" ry="25" fill="url(#startGrad)"/>
    <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">🚀 START</text>
  </g>
  
  <!-- Arrow: Start to Input -->
  <path d="M 500 130 L 500 155" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- User Input Box -->
  <g filter="url(#shadow)" transform="translate(300, 160)">
    <rect width="400" height="70" rx="10" fill="#1a1a2e" stroke="#667eea" stroke-width="2"/>
    <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#667eea">📥 User Input</text>
    <text x="200" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Portfolio data (CSV/JSON/Text) + Strategy + Config</text>
  </g>
  
  <!-- Arrow: Input to Compliance Check -->
  <path d="M 500 235 L 500 260" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Compliance Check Decision -->
  <g filter="url(#shadow)" transform="translate(400, 265)">
    <polygon points="100,0 200,45 100,90 0,45" fill="#1a1a2e" stroke="url(#decisionGrad)" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fa709a">Initial</text>
    <text x="100" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fa709a">Violations?</text>
  </g>
  
  <!-- Yes path from compliance - warning box -->
  <g filter="url(#shadow)" transform="translate(680, 285)">
    <rect width="200" height="45" rx="8" fill="#1a1a2e" stroke="#f5576c" stroke-width="2"/>
    <text x="100" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f5576c">⚠️ Log violations, continue</text>
  </g>
  <path d="M 600 310 L 670 310" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="635" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f5576c">Yes</text>
  
  <!-- Arrow from warning to main flow -->
  <path d="M 780 330 L 780 365 L 500 365" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Arrow: No violations - continue -->
  <path d="M 500 360 L 500 390" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="480" y="378" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#43e97b">No</text>
  
  <!-- Iteration Loop Box -->
  <g filter="url(#shadow)" transform="translate(80, 400)">
    <rect width="840" height="580" rx="12" fill="none" stroke="#4facfe" stroke-width="2" stroke-dasharray="10,5"/>
    <text x="25" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4facfe">🔄 ITERATION LOOP (1 to max_iterations)</text>
  </g>
  
  <!-- Phase 2: Parallel Analysis -->
  <g filter="url(#shadow)" transform="translate(250, 440)">
    <rect width="500" height="85" rx="10" fill="#1a1a2e" stroke="url(#processGrad)" stroke-width="2"/>
    <text x="250" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4facfe">🔍 Parallel Analysis</text>
    <text x="250" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">All 5 agents analyze portfolio independently</text>
    
    <!-- Mini agent icons -->
    <rect x="50" y="55" width="70" height="22" rx="4" fill="#2d2d44"/>
    <text x="85" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#43e97b">Market</text>
    
    <rect x="130" y="55" width="60" height="22" rx="4" fill="#2d2d44"/>
    <text x="160" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fa709a">Risk</text>
    
    <rect x="200" y="55" width="60" height="22" rx="4" fill="#2d2d44"/>
    <text x="230" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#667eea">Tax</text>
    
    <rect x="270" y="55" width="60" height="22" rx="4" fill="#2d2d44"/>
    <text x="300" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f093fb">ESG</text>
    
    <rect x="340" y="55" width="70" height="22" rx="4" fill="#2d2d44"/>
    <text x="375" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4facfe">Trading</text>
  </g>
  
  <!-- Arrow: Analysis to Iteration Check -->
  <path d="M 500 530 L 500 555" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- First Iteration Check -->
  <g filter="url(#shadow)" transform="translate(400, 560)">
    <polygon points="100,0 200,42 100,84 0,42" fill="#1a1a2e" stroke="url(#decisionGrad)" stroke-width="2"/>
    <text x="100" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fa709a">Iteration</text>
    <text x="100" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fa709a">&gt; 1?</text>
  </g>
  
  <!-- Yes: Debate Phase -->
  <g filter="url(#shadow)" transform="translate(680, 575)">
    <rect width="200" height="55" rx="10" fill="#1a1a2e" stroke="#f093fb" stroke-width="2"/>
    <text x="100" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f093fb">💬 Inter-Agent Debate</text>
    <text x="100" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#aaa">Agents exchange concerns</text>
  </g>
  <path d="M 600 602 L 670 602" stroke="#fee140" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="635" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fee140">Yes</text>
  
  <!-- Arrow from debate merging back -->
  <path d="M 780 630 L 780 660 L 500 660" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- No: Skip to proposals -->
  <path d="M 500 648 L 500 680" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="480" y="670" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#43e97b">No</text>
  
  <!-- Phase 4: Proposal Generation -->
  <g filter="url(#shadow)" transform="translate(300, 685)">
    <rect width="400" height="50" rx="10" fill="#1a1a2e" stroke="#fee140" stroke-width="2"/>
    <text x="200" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fee140">📝 Collect Proposals</text>
    <text x="200" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Each agent proposes trade plan based on analysis</text>
  </g>
  
  <!-- Arrow: Proposals to Best Selection -->
  <path d="M 500 740 L 500 760" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Select Best Proposal -->
  <g filter="url(#shadow)" transform="translate(300, 765)">
    <rect width="400" height="45" rx="10" fill="#1a1a2e" stroke="#4facfe" stroke-width="2"/>
    <text x="200" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4facfe">🏆 Select Best Proposal (by conviction score)</text>
  </g>
  
  <!-- Arrow to Voting -->
  <path d="M 500 815 L 500 835" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Phase 5: Voting Box -->
  <g filter="url(#shadow)" transform="translate(275, 840)">
    <rect width="450" height="100" rx="10" fill="#1a1a2e" stroke="url(#successGrad)" stroke-width="2"/>
    <text x="225" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#43e97b">🗳️ Voting Phase</text>
    <text x="225" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">All agents vote on best proposal (score 0-100)</text>
    
    <!-- Vote options -->
    <rect x="40" y="55" width="100" height="28" rx="5" fill="#2d3a2d"/>
    <text x="90" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#43e97b">✅ APPROVE ≥70</text>
    
    <rect x="175" y="55" width="100" height="28" rx="5" fill="#3a2d2d"/>
    <text x="225" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f5576c">❌ REJECT &lt;60</text>
    
    <rect x="310" y="55" width="100" height="28" rx="5" fill="#3a3a2d"/>
    <text x="360" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fee140">⏸️ ABSTAIN 60-69</text>
  </g>
  
  <!-- Arrow: Voting to Consensus Check -->
  <path d="M 500 945 L 500 970" stroke="#888" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Consensus Check Decision -->
  <g filter="url(#shadow)" transform="translate(350, 975)">
    <polygon points="150,0 300,55 150,110 0,55" fill="#1a1a2e" stroke="url(#decisionGrad)" stroke-width="2.5"/>
    <text x="150" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fa709a">Consensus</text>
    <text x="150" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fa709a">Reached?</text>
    <text x="150" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888">(≥ threshold %)</text>
  </g>
  
  <!-- Yes: Success Path -->
  <g filter="url(#shadow)" transform="translate(300, 1110)">
    <rect width="200" height="60" rx="10" fill="#1a1a2e" stroke="url(#successGrad)" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#43e97b">✅ CONSENSUS!</text>
    <text x="100" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Return approved trade plan</text>
  </g>
  <path d="M 500 1090 L 500 1100" stroke="#43e97b" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="515" y="1095" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#43e97b">Yes</text>
  
  <!-- No: Check max iterations -->
  <g filter="url(#shadow)" transform="translate(680, 1000)">
    <polygon points="90,0 180,45 90,90 0,45" fill="#1a1a2e" stroke="url(#decisionGrad)" stroke-width="2"/>
    <text x="90" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fa709a">Max</text>
    <text x="90" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fa709a">Iterations?</text>
  </g>
  <path d="M 650 1030 L 670 1045" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="655" y="1020" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f5576c">No</text>
  
  <!-- No: Loop back arrow -->
  <path d="M 770 1000 L 770 430 L 760 430" stroke="#4facfe" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>
  <text x="780" y="700" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4facfe">No → Next</text>
  <text x="780" y="715" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#4facfe">Iteration</text>
  
  <!-- Yes (Max Reached): Fallback -->
  <g filter="url(#shadow)" transform="translate(700, 1110)">
    <rect width="180" height="60" rx="10" fill="#1a1a2e" stroke="url(#failGrad)" stroke-width="2"/>
    <text x="90" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f5576c">⚠️ FALLBACK</text>
    <text x="90" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Use conservative strategy</text>
  </g>
  <path d="M 770 1090 L 770 1100" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="785" y="1095" font-family="Arial, sans-serif" font-size="10" fill="#f5576c">Yes</text>
  
  <!-- End nodes -->
  <g filter="url(#shadow)" transform="translate(540, 1110)">
    <ellipse cx="0" cy="30" rx="30" ry="15" fill="url(#successGrad)"/>
    <text x="0" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">🏁</text>
  </g>
  
  <g filter="url(#shadow)" transform="translate(920, 1110)">
    <ellipse cx="0" cy="30" rx="30" ry="15" fill="url(#failGrad)"/>
    <text x="0" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">🏁</text>
  </g>
  
  <!-- Version -->
  <text x="950" y="1185" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#444">v2.1 - Optimization Flow Chart</text>
</svg>
