<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <!-- Gradients -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="orchestratorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="commBusGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="agentGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="agentGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="agentGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="agentGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="agentGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="externalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="#0f0f23"/>
  
  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#headerGrad)">Portfolio Swarm System Architecture</text>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#888">Multi-Agent Portfolio Optimization powered by Google Gemini AI</text>
  
  <!-- User Interface Layer -->
  <g filter="url(#shadow)">
    <rect x="50" y="90" width="1100" height="100" rx="12" fill="#1a1a2e" stroke="#667eea" stroke-width="2"/>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#667eea">USER INTERFACE LAYER</text>
    
    <!-- Web UI -->
    <rect x="100" y="135" width="180" height="40" rx="8" fill="#2d2d44"/>
    <text x="190" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">🌐 Web UI (Flask)</text>
    
    <!-- CLI -->
    <rect x="320" y="135" width="180" height="40" rx="8" fill="#2d2d44"/>
    <text x="410" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">💻 CLI Interface</text>
    
    <!-- Demo -->
    <rect x="540" y="135" width="180" height="40" rx="8" fill="#2d2d44"/>
    <text x="630" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">🎮 Demo Script</text>
    
    <!-- Streamlit -->
    <rect x="760" y="135" width="180" height="40" rx="8" fill="#2d2d44"/>
    <text x="850" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">📊 Streamlit UI</text>
    
    <!-- REST API -->
    <rect x="980" y="135" width="130" height="40" rx="8" fill="#2d2d44"/>
    <text x="1045" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">🔌 REST API</text>
  </g>
  
  <!-- Connection Arrow: UI to Orchestrator -->
  <path d="M 600 190 L 600 220" stroke="#f093fb" stroke-width="3" marker-end="url(#arrowPink)"/>
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f093fb"/>
    </marker>
  </defs>
  
  <!-- Swarm Orchestrator -->
  <g filter="url(#shadow)">
    <rect x="250" y="225" width="700" height="120" rx="12" fill="#1a1a2e" stroke="url(#orchestratorGrad)" stroke-width="3"/>
    <text x="300" y="255" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">🎯 SWARM ORCHESTRATOR</text>
    
    <text x="280" y="285" font-family="Arial, sans-serif" font-size="11" fill="#aaa">• Manages iteration cycles (1-20 max)</text>
    <text x="280" y="305" font-family="Arial, sans-serif" font-size="11" fill="#aaa">• Tracks consensus (threshold: 50-100%)</text>
    <text x="560" y="285" font-family="Arial, sans-serif" font-size="11" fill="#aaa">• Coordinates agent communication</text>
    <text x="560" y="305" font-family="Arial, sans-serif" font-size="11" fill="#aaa">• Handles exit conditions &amp; fallback</text>
    <text x="820" y="285" font-family="Arial, sans-serif" font-size="11" fill="#aaa">• Strategy selection</text>
    <text x="820" y="305" font-family="Arial, sans-serif" font-size="11" fill="#aaa">• Progress callbacks</text>
  </g>
  
  <!-- Connection Arrow: Orchestrator to CommBus -->
  <path d="M 600 345 L 600 375" stroke="#4facfe" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4facfe"/>
    </marker>
  </defs>
  
  <!-- Communication Bus -->
  <g filter="url(#shadow)">
    <rect x="150" y="380" width="900" height="80" rx="12" fill="#1a1a2e" stroke="url(#commBusGrad)" stroke-width="3"/>
    <text x="200" y="410" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4facfe">📡 COMMUNICATION BUS</text>
    
    <text x="200" y="435" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Message routing (agent-to-agent, broadcast)</text>
    <text x="530" y="435" font-family="Arial, sans-serif" font-size="11" fill="#aaa">History tracking (full audit trail)</text>
    <text x="800" y="435" font-family="Arial, sans-serif" font-size="11" fill="#aaa">Subscribe/publish pattern</text>
  </g>
  
  <!-- Connection line from CommBus to Agents -->
  <line x1="600" y1="460" x2="600" y2="490" stroke="#fff" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Agent Layer -->
  <g filter="url(#shadow)">
    <!-- Market Analysis Agent -->
    <rect x="60" y="500" width="200" height="140" rx="12" fill="#1a1a2e" stroke="url(#agentGrad1)" stroke-width="2"/>
    <text x="160" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#43e97b">📈 Market Analysis</text>
    <text x="80" y="555" font-family="Arial, sans-serif" font-size="10" fill="#888">• Market valuations</text>
    <text x="80" y="575" font-family="Arial, sans-serif" font-size="10" fill="#888">• Sector trends</text>
    <text x="80" y="595" font-family="Arial, sans-serif" font-size="10" fill="#888">• PE ratio analysis</text>
    <text x="80" y="615" font-family="Arial, sans-serif" font-size="10" fill="#888">• Sentiment signals</text>
    
    <!-- Risk Assessment Agent -->
    <rect x="280" y="500" width="200" height="140" rx="12" fill="#1a1a2e" stroke="url(#agentGrad2)" stroke-width="2"/>
    <text x="380" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fa709a">⚠️ Risk Assessment</text>
    <text x="300" y="555" font-family="Arial, sans-serif" font-size="10" fill="#888">• Compliance checks</text>
    <text x="300" y="575" font-family="Arial, sans-serif" font-size="10" fill="#888">• VaR / Beta analysis</text>
    <text x="300" y="595" font-family="Arial, sans-serif" font-size="10" fill="#888">• Position limits</text>
    <text x="300" y="615" font-family="Arial, sans-serif" font-size="10" fill="#888">• Sector concentration</text>
    
    <!-- Tax Strategy Agent -->
    <rect x="500" y="500" width="200" height="140" rx="12" fill="#1a1a2e" stroke="url(#agentGrad3)" stroke-width="2"/>
    <text x="600" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#667eea">💰 Tax Strategy</text>
    <text x="520" y="555" font-family="Arial, sans-serif" font-size="10" fill="#888">• Tax lot optimization</text>
    <text x="520" y="575" font-family="Arial, sans-serif" font-size="10" fill="#888">• Short/Long-term gains</text>
    <text x="520" y="595" font-family="Arial, sans-serif" font-size="10" fill="#888">• Loss harvesting</text>
    <text x="520" y="615" font-family="Arial, sans-serif" font-size="10" fill="#888">• Wash sale rules</text>
    
    <!-- ESG Compliance Agent -->
    <rect x="720" y="500" width="200" height="140" rx="12" fill="#1a1a2e" stroke="url(#agentGrad4)" stroke-width="2"/>
    <text x="820" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f093fb">🌱 ESG Compliance</text>
    <text x="740" y="555" font-family="Arial, sans-serif" font-size="10" fill="#888">• ESG score analysis</text>
    <text x="740" y="575" font-family="Arial, sans-serif" font-size="10" fill="#888">• Sustainability metrics</text>
    <text x="740" y="595" font-family="Arial, sans-serif" font-size="10" fill="#888">• Controversies check</text>
    <text x="740" y="615" font-family="Arial, sans-serif" font-size="10" fill="#888">• Green investment fit</text>
    
    <!-- Algorithmic Trading Agent -->
    <rect x="940" y="500" width="200" height="140" rx="12" fill="#1a1a2e" stroke="url(#agentGrad5)" stroke-width="2"/>
    <text x="1040" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4facfe">🤖 Algo Trading</text>
    <text x="960" y="555" font-family="Arial, sans-serif" font-size="10" fill="#888">• Execution planning</text>
    <text x="960" y="575" font-family="Arial, sans-serif" font-size="10" fill="#888">• Liquidity analysis</text>
    <text x="960" y="595" font-family="Arial, sans-serif" font-size="10" fill="#888">• VWAP/TWAP strategy</text>
    <text x="960" y="615" font-family="Arial, sans-serif" font-size="10" fill="#888">• Slippage estimation</text>
  </g>
  
  <!-- Gemini AI Integration Box -->
  <g filter="url(#shadow)">
    <rect x="350" y="660" width="500" height="60" rx="12" fill="#1a1a2e" stroke="#fbbd23" stroke-width="2"/>
    <text x="600" y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fbbd23">🧠 Google Gemini AI Integration (gemini-2.5-flash)</text>
  </g>
  
  <!-- External Integrations (bottom) -->
  <g filter="url(#shadow)">
    <rect x="50" y="740" width="1100" height="80" rx="12" fill="#1a1a2e" stroke="url(#externalGrad)" stroke-width="2"/>
    <text x="100" y="770" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#a8edea">🔗 EXTERNAL INTEGRATIONS &amp; DATA SOURCES</text>
    
    <!-- Sub boxes -->
    <rect x="100" y="780" width="150" height="30" rx="5" fill="#2d2d44"/>
    <text x="175" y="800" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Market Data APIs</text>
    
    <rect x="280" y="780" width="150" height="30" rx="5" fill="#2d2d44"/>
    <text x="355" y="800" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">File Input (CSV/JSON)</text>
    
    <rect x="460" y="780" width="150" height="30" rx="5" fill="#2d2d44"/>
    <text x="535" y="800" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Text Parser (NLP)</text>
    
    <rect x="640" y="780" width="150" height="30" rx="5" fill="#2d2d44"/>
    <text x="715" y="800" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">ESG Data Providers</text>
    
    <rect x="820" y="780" width="150" height="30" rx="5" fill="#2d2d44"/>
    <text x="895" y="800" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Broker Integration</text>
    
    <rect x="1000" y="780" width="120" height="30" rx="5" fill="#2d2d44"/>
    <text x="1060" y="800" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Logging/Monitor</text>
  </g>
  
  <!-- Version text -->
  <text x="1150" y="870" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#444">v2.0 - Swarm Pattern Architecture</text>
</svg>
