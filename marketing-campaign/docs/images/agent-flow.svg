<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" width="950" height="700">
  <defs>
    <linearGradient id="flowStart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowStep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowDecision" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowEnd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
    <filter id="shadowFlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="950" height="700" fill="#0f0f23"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Campaign Execution Flow</text>
  
  <!-- Step 1: Campaign Request -->
  <ellipse cx="475" cy="80" rx="100" ry="30" fill="url(#flowStart)" filter="url(#shadowFlow)"/>
  <text x="475" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Campaign Request</text>
  
  <!-- Arrow -->
  <path d="M475 110 L475 140" stroke="#667eea" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Coordinator Receives -->
  <rect x="350" y="145" width="250" height="50" rx="10" fill="url(#flowStep)" filter="url(#shadowFlow)"/>
  <text x="475" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">🧠 Coordinator Analyzes Request</text>
  
  <!-- Arrow -->
  <path d="M475 195 L475 225" stroke="#667eea" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 3: Audience Segmentation -->
  <rect x="350" y="230" width="250" height="50" rx="10" fill="#6c5ce7" filter="url(#shadowFlow)"/>
  <text x="475" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">👥 Audience Segmentation</text>
  
  <!-- Arrow -->
  <path d="M475 280 L475 310" stroke="#667eea" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Decision: Channel Selection -->
  <polygon points="475,315 575,365 475,415 375,365" fill="url(#flowDecision)" filter="url(#shadowFlow)"/>
  <text x="475" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Channel</text>
  <text x="475" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Selection?</text>
  
  <!-- Branches from decision -->
  <!-- Email Branch -->
  <path d="M375 365 L180 365 L180 430" stroke="#4facfe" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="230" y="355" font-family="Arial, sans-serif" font-size="10" fill="#4facfe">Email</text>
  
  <!-- SMS Branch -->
  <path d="M475 415 L475 430" stroke="#00b894" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="425" font-family="Arial, sans-serif" font-size="10" fill="#00b894">SMS</text>
  
  <!-- Instagram Branch -->
  <path d="M575 365 L770 365 L770 430" stroke="#e17055" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="355" font-family="Arial, sans-serif" font-size="10" fill="#e17055">Instagram</text>
  
  <!-- Content Generation Boxes -->
  <!-- Email Content -->
  <rect x="100" y="435" width="160" height="55" rx="8" fill="#4facfe" filter="url(#shadowFlow)"/>
  <text x="180" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">✉️ Email Content</text>
  <text x="180" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">HTML + Text + A/B</text>
  
  <!-- SMS Content -->
  <rect x="395" y="435" width="160" height="55" rx="8" fill="#00b894" filter="url(#shadowFlow)"/>
  <text x="475" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">📱 SMS Content</text>
  <text x="475" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">160 chars optimized</text>
  
  <!-- Instagram Content -->
  <rect x="690" y="435" width="160" height="55" rx="8" fill="#e17055" filter="url(#shadowFlow)"/>
  <text x="770" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">📸 Instagram Post</text>
  <text x="770" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">Caption + Hashtags</text>
  
  <!-- Converge arrows to Compliance -->
  <path d="M180 490 L180 515 L380 530" stroke="#a0a0a0" stroke-width="1.5"/>
  <path d="M475 490 L475 530" stroke="#a0a0a0" stroke-width="1.5"/>
  <path d="M770 490 L770 515 L570 530" stroke="#a0a0a0" stroke-width="1.5"/>
  
  <!-- Compliance Check -->
  <rect x="350" y="530" width="250" height="50" rx="10" fill="#fd79a8" filter="url(#shadowFlow)"/>
  <text x="475" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">⚖️ Compliance Validation</text>
  
  <!-- Arrow -->
  <path d="M475 580 L475 610" stroke="#667eea" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Sending Execution -->
  <rect x="350" y="615" width="250" height="50" rx="10" fill="#00cec9" filter="url(#shadowFlow)"/>
  <text x="475" y="645" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">🚀 Execute &amp; Send</text>
  
  <!-- Arrow -->
  <path d="M475 665 L475 680" stroke="#667eea" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- End -->
  <ellipse cx="475" cy="695" rx="80" ry="20" fill="url(#flowEnd)" filter="url(#shadowFlow)"/>
  <text x="475" y="700" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Complete ✓</text>
  
  <!-- Legend -->
  <rect x="20" y="600" width="120" height="85" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="30" y="618" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">Legend</text>
  <circle cx="35" cy="635" r="6" fill="#667eea"/>
  <text x="50" y="639" font-family="Arial, sans-serif" font-size="9" fill="#a0a0a0">Start/End</text>
  <rect x="29" y="648" width="12" height="10" rx="2" fill="#f093fb"/>
  <text x="50" y="657" font-family="Arial, sans-serif" font-size="9" fill="#a0a0a0">Process</text>
  <polygon points="35,672 41,678 35,684 29,678" fill="url(#flowDecision)"/>
  <text x="50" y="680" font-family="Arial, sans-serif" font-size="9" fill="#a0a0a0">Decision</text>
</svg>