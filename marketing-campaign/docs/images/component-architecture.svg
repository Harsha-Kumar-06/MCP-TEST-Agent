  <text x="220" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">api/</text>
  
  <text x="160" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">Next.js 14 + React</text>
  
  <!-- Agent Layer Box -->
  <rect x="320" y="55" width="260" height="180" rx="10" fill="none" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="450" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb">Agent Layer</text>
  
  <rect x="340" y="90" width="100" height="40" rx="5" fill="url(#compGrad2)" filter="url(#compShadow)"/>
  <text x="390" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">coordinator</text>
  <text x="390" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">-agent.ts</text>
  
  <rect x="460" y="90" width="100" height="40" rx="5" fill="url(#compGrad2)" filter="url(#compShadow)"/>
  <text x="510" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">email-content</text>
  <text x="510" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">-agent.ts</text>
  
  <rect x="340" y="145" width="100" height="40" rx="5" fill="url(#compGrad2)" filter="url(#compShadow)"/>
  <text x="390" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">sms-content</text>
  <text x="390" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">-agent.ts</text>
  
  <rect x="460" y="145" width="100" height="40" rx="5" fill="url(#compGrad2)" filter="url(#compShadow)"/>
  <text x="510" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">compliance</text>
  <text x="510" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">-agent.ts</text>
  
  <text x="450" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">Genkit + Gemini AI</text>
  
