  <text x="680" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">.json</text>
  
  <rect x="750" y="90" width="100" height="40" rx="5" fill="url(#compGrad3)" filter="url(#compShadow)"/>
  <text x="800" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">contacts</text>
  <text x="800" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">.json</text>
  
  <rect x="630" y="145" width="100" height="40" rx="5" fill="url(#compGrad3)" filter="url(#compShadow)"/>
  <text x="680" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">contact-lists</text>
  <text x="680" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">.json</text>
  
  <rect x="750" y="145" width="100" height="40" rx="5" fill="url(#compGrad3)" filter="url(#compShadow)"/>
  <text x="800" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">tracking</text>
  <text x="800" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">.json</text>
  
  <text x="740" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">File-based JSON DB</text>
  
  <!-- Connection Arrows -->
  <path d="M290 135 L320 135" stroke="#a0a0a0" stroke-width="2"/>
  <path d="M580 135 L610 135" stroke="#a0a0a0" stroke-width="2"/>
  
  <!-- External Services Box -->
