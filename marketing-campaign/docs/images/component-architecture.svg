<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <linearGradient id="compGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="compShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#13111a"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">Component Architecture</text>
  
  <!-- Frontend Layer Box -->
  <rect x="30" y="55" width="260" height="180" rx="10" fill="none" stroke="#667eea" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="160" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#667eea">Frontend Layer</text>
  
  <rect x="50" y="90" width="100" height="40" rx="5" fill="url(#compGrad1)" filter="url(#compShadow)"/>
  <text x="100" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">pages/</text>
  
  <rect x="170" y="90" width="100" height="40" rx="5" fill="url(#compGrad1)" filter="url(#compShadow)"/>
  <text x="220" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">components/</text>
  
  <rect x="50" y="145" width="100" height="40" rx="5" fill="url(#compGrad1)" filter="url(#compShadow)"/>
  <text x="100" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">styles/</text>
  
