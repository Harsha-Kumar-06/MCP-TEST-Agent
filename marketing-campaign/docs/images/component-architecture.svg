  <text x="125" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e">Email Delivery</text>
  
  <rect x="210" y="310" width="130" height="60" rx="8" fill="#00b894" filter="url(#compShadow)"/>
  <text x="275" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">📱 Twilio</text>
  <text x="275" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">SMS Delivery</text>
  
  <rect x="360" y="310" width="130" height="60" rx="8" fill="#0984e3" filter="url(#compShadow)"/>
  <text x="425" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">📱 Textbelt</text>
  <text x="425" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">Free SMS (1/day)</text>
  
  <rect x="510" y="310" width="130" height="60" rx="8" fill="#e17055" filter="url(#compShadow)"/>
  <text x="575" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">📸 Graph API</text>
  <text x="575" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">Instagram Posts</text>
  
  <rect x="660" y="310" width="130" height="60" rx="8" fill="#6c5ce7" filter="url(#compShadow)"/>
  <text x="725" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">🤖 Gemini AI</text>
  <text x="725" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">Content Gen</text>
  
