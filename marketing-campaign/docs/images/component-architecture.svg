  <text x="175" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">google-adk-config.ts</text>
  
  <rect x="280" y="460" width="150" height="45" rx="5" fill="#e84393" filter="url(#compShadow)"/>
  <text x="355" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">llm-config.ts</text>
  
  <rect x="460" y="460" width="150" height="45" rx="5" fill="#d63031" filter="url(#compShadow)"/>
  <text x="535" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">init.ts</text>
  
  <rect x="640" y="460" width="150" height="45" rx="5" fill="#b33939" filter="url(#compShadow)"/>
  <text x="715" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">.env (secrets)</text>
