<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450">
  <defs>
    <linearGradient id="techGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <filter id="techShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="450" fill="#0d1117"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Technology Stack</text>
  
  <!-- Frontend Stack -->
  <rect x="30" y="70" width="200" height="160" rx="12" fill="none" stroke="#667eea" stroke-width="2"/>
  <rect x="30" y="70" width="200" height="35" rx="12" fill="url(#techGrad1)"/>
  <text x="130" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">🖥️ Frontend</text>
  
  <text x="130" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">Next.js 14</text>
  <text x="130" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">React 18</text>
  <text x="130" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">TailwindCSS</text>
  <text x="130" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">TypeScript</text>
  <text x="130" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Web Dashboard UI</text>
  
  <!-- Backend Stack -->
  <rect x="250" y="70" width="200" height="160" rx="12" fill="none" stroke="#f093fb" stroke-width="2"/>
  <rect x="250" y="70" width="200" height="35" rx="12" fill="url(#techGrad2)"/>
  <text x="350" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">⚙️ Backend</text>
  
  <text x="350" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f093fb">Node.js 18+</text>
  <text x="350" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f093fb">TypeScript</text>
  <text x="350" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f093fb">API Routes</text>
  <text x="350" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f093fb">JSON Database</text>
  <text x="350" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Business Logic</text>
  
  <!-- AI/ML Stack -->
  <rect x="470" y="70" width="200" height="160" rx="12" fill="none" stroke="#4facfe" stroke-width="2"/>
  <rect x="470" y="70" width="200" height="35" rx="12" fill="url(#techGrad3)"/>
  <text x="570" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">🤖 AI / ML</text>
  
  <text x="570" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">Google ADK</text>
  <text x="570" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">Genkit</text>
  <text x="570" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">Gemini 2.5 Flash</text>
  <text x="570" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4facfe">Multi-Agent System</text>
  <text x="570" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Content Generation</text>
  
  <!-- Integrations Stack -->
  <rect x="690" y="70" width="180" height="160" rx="12" fill="none" stroke="#43e97b" stroke-width="2"/>
  <rect x="690" y="70" width="180" height="35" rx="12" fill="url(#techGrad4)"/>
  <text x="780" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">🔗 Integrations</text>
  
  <text x="780" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#43e97b">Gmail SMTP</text>
  <text x="780" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#43e97b">Twilio / Textbelt</text>
  <text x="780" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#43e97b">Facebook Graph API</text>
  <text x="780" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#43e97b">Nodemailer</text>
  <text x="780" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Message Delivery</text>
  
  <!-- Channel Icons Row -->
  <text x="450" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Supported Channels</text>
  
  <!-- Email Channel -->
  <rect x="150" y="290" width="150" height="70" rx="10" fill="#4facfe" filter="url(#techShadow)"/>
  <text x="225" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">✉️</text>
  <text x="225" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Email</text>
  
  <!-- SMS Channel -->
  <rect x="375" y="290" width="150" height="70" rx="10" fill="#00b894" filter="url(#techShadow)"/>
  <text x="450" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">📱</text>
  <text x="450" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">SMS</text>
  
  <!-- Instagram Channel -->
  <rect x="600" y="290" width="150" height="70" rx="10" fill="#e17055" filter="url(#techShadow)"/>
  <text x="675" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff">📸</text>
  <text x="675" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Instagram</text>
  
  <!-- Features Row -->
  <text x="450" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">A/B Testing • Compliance Validation • UTM Tracking • Multi-Agent Coordination</text>
  
  <!-- Version Info -->
  <text x="450" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#444">Marketing Campaign Coordinator v1.0 | Powered by Google ADK</text>
</svg>