<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="dataGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <marker id="dataArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4facfe"/>
    </marker>
    <filter id="dataShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#0d1117"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">Data Flow Diagram</text>
  
  <!-- User Input -->
  <ellipse cx="100" cy="100" rx="70" ry="35" fill="#667eea" filter="url(#dataShadow)"/>
  <text x="100" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">👤 User</text>
  <text x="100" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">Input</text>
  
  <!-- Arrow -->
  <path d="M170 100 L230 100" stroke="#4facfe" stroke-width="2" marker-end="url(#dataArrow)"/>
  <text x="200" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0a0a0">Campaign</text>
  <text x="200" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0a0a0">Details</text>
  
  <!-- Frontend -->
  <rect x="245" y="70" width="120" height="60" rx="10" fill="#3b82f6" filter="url(#dataShadow)"/>
  <text x="305" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">🖥️ Frontend</text>
  <text x="305" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">Next.js</text>
  
  <!-- Arrow -->
  <path d="M365 100 L425 100" stroke="#4facfe" stroke-width="2" marker-end="url(#dataArrow)"/>
  <text x="395" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0a0a0">API</text>
  <text x="395" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0a0a0">Request</text>
  
  <!-- API Layer -->
  <rect x="440" y="70" width="120" height="60" rx="10" fill="#8b5cf6" filter="url(#dataShadow)"/>
  <text x="500" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">⚡ API Layer</text>
  <text x="500" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">/api/campaigns</text>
  
  <!-- Arrow -->
  <path d="M560 100 L620 100" stroke="#4facfe" stroke-width="2" marker-end="url(#dataArrow)"/>
  
  <!-- Coordinator -->
  <rect x="635" y="70" width="130" height="60" rx="10" fill="#ec4899" filter="url(#dataShadow)"/>
  <text x="700" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">🧠 Coordinator</text>
  <text x="700" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">Agent</text>
  
  <!-- Arrow down from Coordinator -->
  <path d="M700 130 L700 170" stroke="#4facfe" stroke-width="2" marker-end="url(#dataArrow)"/>
  
  <!-- Processing Row -->
  <rect x="50" y="185" width="800" height="100" rx="10" fill="rgba(79,172,254,0.1)" stroke="#4facfe" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="450" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4facfe">Parallel Processing</text>
  
  <!-- Agent boxes -->
  <rect x="70" y="220" width="100" height="50" rx="8" fill="#10b981" filter="url(#dataShadow)"/>
  <text x="120" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">👥 Audience</text>
  <text x="120" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Segmentation</text>
  
  <rect x="190" y="220" width="100" height="50" rx="8" fill="#f59e0b" filter="url(#dataShadow)"/>
  <text x="240" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">✉️ Email</text>
  <text x="240" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Content</text>
  
  <rect x="310" y="220" width="100" height="50" rx="8" fill="#06b6d4" filter="url(#dataShadow)"/>
  <text x="360" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">📱 SMS</text>
  <text x="360" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Content</text>
  
  <rect x="430" y="220" width="100" height="50" rx="8" fill="#e11d48" filter="url(#dataShadow)"/>
  <text x="480" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">📸 Instagram</text>
  <text x="480" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Posting</text>
  
  <rect x="550" y="220" width="100" height="50" rx="8" fill="#8b5cf6" filter="url(#dataShadow)"/>
  <text x="600" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">⚖️ Compliance</text>
  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Check</text>
  
  <rect x="670" y="220" width="100" height="50" rx="8" fill="#0ea5e9" filter="url(#dataShadow)"/>
  <text x="720" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fff">📊 Analytics</text>
  <text x="720" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Setup</text>
  
  <!-- Arrow down to execution -->
  <path d="M450 285 L450 320" stroke="#4facfe" stroke-width="2" marker-end="url(#dataArrow)"/>
  <text x="470" y="305" font-family="Arial, sans-serif" font-size="8" fill="#a0a0a0">Results</text>
  
  <!-- Execution Layer -->
  <rect x="300" y="330" width="300" height="60" rx="10" fill="#22c55e" filter="url(#dataShadow)"/>
  <text x="450" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">🚀 Sending Agents Execute</text>
  <text x="450" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">SMTP | Twilio | Graph API</text>
  
  <!-- Arrows to external services -->
  <path d="M300 360 L180 360 L180 420" stroke="#4facfe" stroke-width="2" marker-end="url(#dataArrow)"/>
  <path d="M450 390 L450 420" stroke="#4facfe" stroke-width="2" marker-end="url(#dataArrow)"/>
  <path d="M600 360 L720 360 L720 420" stroke="#4facfe" stroke-width="2" marker-end="url(#dataArrow)"/>
  
  <!-- External targets -->
  <rect x="120" y="430" width="120" height="50" rx="8" fill="#334155" stroke="#4facfe" stroke-width="1"/>
  <text x="180" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">📧 Email Inbox</text>
  <text x="180" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0a0a0">Recipients</text>
  
  <rect x="390" y="430" width="120" height="50" rx="8" fill="#334155" stroke="#4facfe" stroke-width="1"/>
  <text x="450" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">📱 SMS Inbox</text>
  <text x="450" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0a0a0">Recipients</text>
  
  <rect x="660" y="430" width="120" height="50" rx="8" fill="#334155" stroke="#4facfe" stroke-width="1"/>
  <text x="720" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">📸 Instagram</text>
  <text x="720" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a0a0a0">Feed</text>
</svg>