[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/nginx/stdout.log
stderr_logfile=/var/log/nginx/stderr.log

# Landing Page - Port 8501
[program:landing]
command=streamlit run /app/landing_page.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true --server.baseUrlPath=/
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/landing.log
stderr_logfile=/var/log/supervisor/landing_err.log

# Access Controller Agent - Port 8502
[program:access_controller]
command=streamlit run streamlit_app.py --server.port=8502 --server.address=0.0.0.0 --server.headless=true --server.baseUrlPath=/access-controller
directory=/app/access_controller_agent
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/access_controller.log
stderr_logfile=/var/log/supervisor/access_controller_err.log

