<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="600" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">Data Flow Pipeline</text>
  
  <!-- Step 1: Input -->
  <rect x="50" y="70" width="160" height="80" rx="10" fill="#3B82F6" filter="url(#glow)"/>
  <text x="130" y="100" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">1️⃣ INPUT</text>
  <text x="130" y="120" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Loan Application</text>
  <text x="130" y="135" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">JSON / Web Form</text>
  
  <path d="M 210 110 L 260 110" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Validation -->
  <rect x="270" y="70" width="160" height="80" rx="10" fill="#8B5CF6"/>
  <text x="350" y="100" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">2️⃣ VALIDATE</text>
  <text x="350" y="120" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Schema Validation</text>
  <text x="350" y="135" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Pydantic Models</text>
  
  <path d="M 430 110 L 480 110" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: Fan-Out -->
  <rect x="490" y="70" width="160" height="80" rx="10" fill="#EC4899"/>
  <text x="570" y="100" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">3️⃣ FAN-OUT</text>
  <text x="570" y="120" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">asyncio.gather()</text>
  <text x="570" y="135" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Parallel Dispatch</text>
  
  <path d="M 650 110 L 700 110" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Process -->
  <rect x="710" y="70" width="160" height="80" rx="10" fill="#F59E0B"/>
  <text x="790" y="100" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">4️⃣ PROCESS</text>
  <text x="790" y="120" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">3 Agents Execute</text>
  <text x="790" y="135" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">~45 seconds</text>
  
  <!-- Parallel Processing Detail -->
  <rect x="50" y="190" width="250" height="150" rx="8" fill="white" stroke="#3B82F6" stroke-width="2"/>
  <text x="175" y="215" font-family="Arial, sans-serif" font-size="11" fill="#1E293B" text-anchor="middle" font-weight="bold">Credit Agent</text>
  <text x="175" y="235" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Experian/Equifax API Call</text>
  <text x="175" y="250" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Credit Score Extraction</text>
  <text x="175" y="265" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ DTI Calculation</text>
  <text x="175" y="280" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Risk Assessment</text>
  <text x="175" y="295" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Gemini Analysis</text>
  <rect x="60" y="305" width="230" height="25" rx="4" fill="#E0F2FE"/>
  <text x="175" y="322" font-family="Arial, sans-serif" font-size="10" fill="#0369A1" text-anchor="middle">Output: CreditAnalysisResult</text>
  
  <rect x="325" y="190" width="250" height="150" rx="8" fill="white" stroke="#10B981" stroke-width="2"/>
  <text x="450" y="215" font-family="Arial, sans-serif" font-size="11" fill="#1E293B" text-anchor="middle" font-weight="bold">Property Agent</text>
  <text x="450" y="235" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ RentCast API Call</text>
  <text x="450" y="250" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Property Valuation</text>
  <text x="450" y="265" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ LTV Calculation</text>
  <text x="450" y="280" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Market Analysis</text>
  <text x="450" y="295" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Gemini Analysis</text>
  <rect x="335" y="305" width="230" height="25" rx="4" fill="#D1FAE5"/>
  <text x="450" y="322" font-family="Arial, sans-serif" font-size="10" fill="#047857" text-anchor="middle">Output: PropertyValuationResult</text>
  
  <rect x="600" y="190" width="250" height="150" rx="8" fill="white" stroke="#F59E0B" stroke-width="2"/>
  <text x="725" y="215" font-family="Arial, sans-serif" font-size="11" fill="#1E293B" text-anchor="middle" font-weight="bold">Fraud Agent</text>
  <text x="725" y="235" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Persona API Call</text>
  <text x="725" y="250" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Identity Verification</text>
  <text x="725" y="265" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Watchlist Check</text>
  <text x="725" y="280" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Risk Indicators</text>
  <text x="725" y="295" font-family="Arial, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">→ Gemini Analysis</text>
  <rect x="610" y="305" width="230" height="25" rx="4" fill="#FEF3C7"/>
  <text x="725" y="322" font-family="Arial, sans-serif" font-size="10" fill="#B45309" text-anchor="middle">Output: FraudDetectionResult</text>
  
  <!-- Convergence arrows -->
  <path d="M 175 340 L 175 380 L 450 380 L 450 400" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 450 340 L 450 400" stroke="#64748B" stroke-width="2"/>
  <path d="M 725 340 L 725 380 L 450 380" stroke="#64748B" stroke-width="2"/>
  
  <!-- Step 5: Fan-In -->
  <rect x="325" y="410" width="250" height="80" rx="10" fill="#6366F1"/>
  <text x="450" y="440" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">5️⃣ FAN-IN (Aggregator)</text>
  <text x="450" y="460" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Weighted Score: 40% + 35% + 25%</text>
  <text x="450" y="475" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Gemini Final Analysis</text>
  
  <path d="M 450 490 L 450 520" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 6: Output -->
  <rect x="325" y="530" width="250" height="55" rx="10" fill="#22C55E"/>
  <text x="450" y="555" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">6️⃣ OUTPUT</text>
  <text x="450" y="575" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" text-anchor="middle">UnderwritingDecision JSON</text>
  
  <!-- Timeline -->
  <rect x="50" y="530" width="200" height="55" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="150" y="555" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle" font-weight="bold">⏱️ Total Time</text>
  <text x="150" y="575" font-family="Arial, sans-serif" font-size="18" fill="#059669" text-anchor="middle" font-weight="bold">~45 seconds</text>
  
  <rect x="650" y="530" width="200" height="55" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="750" y="555" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle" font-weight="bold">📊 vs Traditional</text>
  <text x="750" y="575" font-family="Arial, sans-serif" font-size="18" fill="#DC2626" text-anchor="middle" font-weight="bold">15+ minutes</text>
</svg>