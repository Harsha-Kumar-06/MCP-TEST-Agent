info:
  title: Credit Profile (OAS 3.1.0)
  version: 2.0.84
servers:
- url: https://sandbox-us-api.experian.com/consumerservices/credit-profile
paths:
  /v2/credit-report:
    post:
      tags:
      - Consumer Services
      summary: Credit Report
      description: 'Retrieves a credit profile with scores and addons requested. This
        is CR API Version 2.<br><br> We are providing 18 test cases for client testing
        under "Examples" button below which include first 13 positive test cases and
        rest 5 negative test cases. Eg: Success_1, Failure_Invalid surname etc.'
      operationId: CreditReports
      parameters:
      - name: clientReferenceId
        in: header
        description: API client generated reference Id to uniquely identify the API
          request.
        schema:
          type: string
          default: SBMYSQL
          enum:
          - SBMYSQL
      - name: Content-Type
        in: header
        description: Input Request format
        required: true
        schema:
          type: string
          default: application/json
          enum:
          - application/json
      - name: Accept
        in: header
        description: Output Response format
        schema:
          type: string
          default: application/json
          enum:
          - application/json
      requestBody:
        description: "Consumer's PII , Requestor Information, Addons and any custom\
          \ options to be specified here."
