      tags:
      - Consumer Services
      summary: Connect Check Credit Profile
      description: |-
        Connect Check is a custom verification process designed specifically to assist the utility, telecommunication and cable industries detect fraud and minimize risk exposure at the time of a service request. Connect Check is focused on the top 100 regulated utility and telecommunications companies that are obligated to "serve all who apply." However, Connect Check can also be a valuable tool for smaller market segments. With Connect Check, service representatives, regardless of their level of credit training, can make immediate and informed service decisions while the applicant is still on the line. <br><br>
         We are providing 10 test cases for client testing under "Examples" button below which include first 5 positive test cases and rest 5 negative test cases.
         Eg: Success_1, Failure_Invalid surname etc.
