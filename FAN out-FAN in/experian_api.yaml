  /v1/employment-insight:
    post:
      tags:
      - Consumer Services
      summary: Employment Insight
      description: 'Employment Insight, a slightly modified version of the Experian
        Credit Profile report, contains consumer identification, employment history,
        and credit information used to substantiate information during the hiring
        or promotion process. As a verification tool, it is used to spot inconsistencies
        in address and employment information, confirm Social Security numbers, and
        reveal other names used. Credit information provided may provide insight on
        an applicant''s responsibility toward his/her obligations. <br><br> We are
        providing 10 test cases for client testing under "Examples" button below which
        include first 5 positive test cases and rest 5 negative test cases. Eg: Success_1,
        Failure_Invalid surname etc.'
      operationId: EmploymentInsightData
      parameters:
      - name: clientReferenceId
        in: header
        description: API client generated reference Id to uniquely identify the API
          request.
        schema:
          type: string
          default: SBMYSQL
          enum:
          - SBMYSQL
      - name: Content-Type
        in: header
        description: Input Request format
        required: true
        schema:
          type: string
          default: application/json
          enum:
          - application/json
