<svg width="920" height="760" viewBox="0 0 920 760" xmlns="http://www.w3.org/2000/svg"
  font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <defs>
    <!-- Arrow markers -->
    <marker id="arr-gray" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-blue" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#22c55e"/>
    </marker>
    <!-- Drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <!-- Subtle inner glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ░░ BACKGROUND ░░ -->
  <rect width="920" height="760" fill="#f1f5f9" rx="0"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="70" x2="920" y2="70" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="0" y1="695" x2="920" y2="695" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ░░ HEADER ░░ -->
  <rect x="0" y="0" width="920" height="70" fill="#0f172a"/>
  <text x="460" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#f8fafc" letter-spacing="-0.3">
    Campaign Validator Agent — Human-in-the-Loop Architecture
  </text>
  <text x="460" y="50" text-anchor="middle" font-size="12" fill="#64748b">
    Multi-Agent Pattern · Google ADK · Gemini 2.0 Flash (Multimodal) · Streamlit · SQLite
  </text>

  <!-- ════════════════════════════════════════════════════════════
       ROW 1 — DATA LAYER
  ════════════════════════════════════════════════════════════ -->
  <!-- Section label -->
  <rect x="24" y="82" width="108" height="20" rx="4" fill="#7c3aed" fill-opacity="0.12"/>
  <text x="78" y="95" text-anchor="middle" font-size="10" font-weight="700" fill="#7c3aed" letter-spacing="0.8">DATA LAYER</text>

  <!-- Campaigns box -->
  <rect x="40" y="108" width="270" height="94" rx="10" fill="white" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="108" width="270" height="30" rx="10" fill="#7c3aed"/>
  <rect x="40" y="128" width="270" height="10" fill="#7c3aed"/>
  <text x="175" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="white">📋  Campaigns Table</text>
  <text x="56" y="156" font-size="11" fill="#475569">id · name · brand</text>
  <text x="56" y="173" font-size="11" fill="#475569">requirements  (free-form paragraph)</text>
  <text x="56" y="190" font-size="11" fill="#475569">created_at</text>

  <!-- Posts box -->
  <rect x="610" y="108" width="270" height="94" rx="10" fill="white" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="610" y="108" width="270" height="30" rx="10" fill="#7c3aed"/>
  <rect x="610" y="128" width="270" height="10" fill="#7c3aed"/>
  <text x="745" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="white">📬  Influencer Posts Table</text>
  <text x="626" y="156" font-size="11" fill="#475569">id · campaign_id · influencer_name</text>
  <text x="626" y="173" font-size="11" fill="#475569">image_path · description (with caption)</text>
  <text x="626" y="190" font-size="11" fill="#475569">status · ai_report · human_decisions</text>

  <!-- Connector label between boxes -->
  <text x="460" y="128" text-anchor="middle" font-size="10" fill="#94a3b8">SQLite Database</text>
  <line x1="310" y1="155" x2="610" y2="155" stroke="#d8b4fe" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Arrows Data → Phase 1 ── -->
  <!-- Campaign requirements → Task Breakdown -->
  <line x1="175" y1="202" x2="175" y2="228" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="175" y1="228" x2="370" y2="228" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="370" y1="228" x2="370" y2="248" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="265" y="224" text-anchor="middle" font-size="9" fill="#94a3b8">requirements</text>

  <!-- Posts → Validators (right side) -->
  <line x1="745" y1="202" x2="745" y2="228" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="745" y1="228" x2="570" y2="228" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="570" y1="228" x2="570" y2="320" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Fan from 570 to 3 validators -->
  <line x1="150" y1="320" x2="570" y2="320" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="150" y1="320" x2="150" y2="338" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="460" y1="320" x2="460" y2="338" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="570" y1="320" x2="770" y2="320" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="770" y1="320" x2="770" y2="338" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="690" y="225" text-anchor="middle" font-size="9" fill="#94a3b8">posts (image + description)</text>

  <!-- ════════════════════════════════════════════════════════════
       ROW 2 — PHASE 1: TASK BREAKDOWN AGENT
  ════════════════════════════════════════════════════════════ -->
  <rect x="24" y="240" width="80" height="20" rx="4" fill="#1d4ed8" fill-opacity="0.12"/>
  <text x="64" y="253" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8" letter-spacing="0.8">PHASE  1</text>

  <rect x="280" y="248" width="360" height="72" rx="10" fill="white" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="248" width="360" height="28" rx="10" fill="#2563eb"/>
  <rect x="280" y="268" width="360" height="8" fill="#2563eb"/>
  <text x="460" y="267" text-anchor="middle" font-size="12" font-weight="700" fill="white">🔍  Task Breakdown Agent  (LLM)</text>
  <text x="460" y="292" text-anchor="middle" font-size="11" fill="#1e40af">Reads campaign requirements paragraph</text>
  <text x="460" y="308" text-anchor="middle" font-size="11" fill="#1e40af">→ Extracts visual &amp; content checkable attributes</text>

  <!-- Arrow Phase 1 → Phase 2 fan-out -->
  <line x1="460" y1="320" x2="460" y2="338" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="530" y="333" font-size="9" fill="#3b82f6">attributes checklist</text>

  <!-- ════════════════════════════════════════════════════════════
       ROW 3 — PHASE 2: VALIDATOR AGENTS
  ════════════════════════════════════════════════════════════ -->
  <rect x="24" y="330" width="80" height="20" rx="4" fill="#1d4ed8" fill-opacity="0.12"/>
  <text x="64" y="343" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8" letter-spacing="0.5">PHASE  2</text>
  <text x="114" y="343" font-size="9" fill="#64748b">(parallel)</text>

  <!-- Validator 1 -->
  <rect x="40" y="338" width="200" height="90" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="338" width="200" height="26" rx="10" fill="#3b82f6"/>
  <rect x="40" y="356" width="200" height="8" fill="#3b82f6"/>
  <text x="140" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="white">🤖  Validator Agent #1</text>
  <text x="140" y="378" text-anchor="middle" font-size="10" fill="#1e3a8a">Input: Image + Description</text>
  <text x="140" y="394" text-anchor="middle" font-size="10" fill="#1e3a8a">Checks every attribute</text>
  <text x="140" y="410" text-anchor="middle" font-size="10" fill="#1e3a8a">Output: pass / fail / doubt</text>

  <!-- Validator 2 -->
  <rect x="360" y="338" width="200" height="90" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="360" y="338" width="200" height="26" rx="10" fill="#3b82f6"/>
  <rect x="360" y="356" width="200" height="8" fill="#3b82f6"/>
  <text x="460" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="white">🤖  Validator Agent #2</text>
  <text x="460" y="378" text-anchor="middle" font-size="10" fill="#1e3a8a">Input: Image + Description</text>
  <text x="460" y="394" text-anchor="middle" font-size="10" fill="#1e3a8a">Checks every attribute</text>
  <text x="460" y="410" text-anchor="middle" font-size="10" fill="#1e3a8a">Output: pass / fail / doubt</text>

  <!-- Validator N -->
  <rect x="680" y="338" width="200" height="90" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="680" y="338" width="200" height="26" rx="10" fill="#3b82f6"/>
  <rect x="680" y="356" width="200" height="8" fill="#3b82f6"/>
  <text x="780" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="white">🤖  Validator Agent #N</text>
  <text x="780" y="378" text-anchor="middle" font-size="10" fill="#1e3a8a">Input: Image + Description</text>
  <text x="780" y="394" text-anchor="middle" font-size="10" fill="#1e3a8a">Checks every attribute</text>
  <text x="780" y="410" text-anchor="middle" font-size="10" fill="#1e3a8a">Output: pass / fail / doubt</text>

  <!-- Ellipsis between validator 2 and N -->
  <text x="600" y="388" text-anchor="middle" font-size="18" fill="#94a3b8">···</text>

  <!-- Arrows validators → HITL (merge) -->
  <line x1="140" y1="428" x2="140" y2="455" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="460" y1="428" x2="460" y2="455" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="780" y1="428" x2="780" y2="455" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="140" y1="455" x2="780" y2="455" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="460" y1="455" x2="460" y2="470" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="570" y="452" font-size="9" fill="#94a3b8">JSON verdicts (checks array)</text>

  <!-- ════════════════════════════════════════════════════════════
       ROW 4 — HITL CHECKPOINT
  ════════════════════════════════════════════════════════════ -->
  <!-- Pause label -->
  <rect x="24" y="462" width="130" height="20" rx="4" fill="#f59e0b" fill-opacity="0.15"/>
  <text x="89" y="475" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309" letter-spacing="0.6">⚠  HITL CHECKPOINT</text>

  <!-- HITL box -->
  <rect x="40" y="472" width="840" height="82" rx="10" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="472" width="840" height="28" rx="10" fill="#f59e0b"/>
  <rect x="40" y="492" width="840" height="8" fill="#f59e0b"/>
  <!-- PAUSE badge -->
  <rect x="54" y="476" width="58" height="18" rx="9" fill="rgba(255,255,255,0.3)"/>
  <text x="83" y="488" text-anchor="middle" font-size="9" font-weight="700" fill="white">⏸  PAUSE</text>
  <text x="460" y="490" text-anchor="middle" font-size="12" font-weight="700" fill="white">👤  Human Review Dashboard</text>
  <!-- Three sub-columns inside HITL -->
  <line x1="340" y1="502" x2="340" y2="554" stroke="#fde68a" stroke-width="1"/>
  <line x1="580" y1="502" x2="580" y2="554" stroke="#fde68a" stroke-width="1"/>
  <text x="190" y="524" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">✅  AI Approved</text>
  <text x="190" y="540" text-anchor="middle" font-size="10" fill="#78716c">→ defaults to Approve</text>
  <text x="460" y="524" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">⚠️  AI Flagged / Rejected</text>
  <text x="460" y="540" text-anchor="middle" font-size="10" fill="#78716c">→ defaults to Reject</text>
  <text x="720" y="524" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">✏️  Human Override</text>
  <text x="720" y="540" text-anchor="middle" font-size="10" fill="#78716c">+ editable feedback message</text>

  <!-- Arrow HITL → Results -->
  <line x1="460" y1="554" x2="460" y2="572" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="540" y="568" font-size="9" fill="#94a3b8">final decisions + feedback</text>

  <!-- ════════════════════════════════════════════════════════════
       ROW 5 — RESULTS
  ════════════════════════════════════════════════════════════ -->
  <rect x="24" y="564" width="70" height="20" rx="4" fill="#16a34a" fill-opacity="0.12"/>
  <text x="59" y="577" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a" letter-spacing="0.8">RESULTS</text>

  <rect x="280" y="574" width="360" height="72" rx="10" fill="white" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="574" width="360" height="28" rx="10" fill="#22c55e"/>
  <rect x="280" y="594" width="360" height="8" fill="#22c55e"/>
  <text x="460" y="592" text-anchor="middle" font-size="12" font-weight="700" fill="white">💾  Final Decisions → Database</text>
  <text x="460" y="618" text-anchor="middle" font-size="11" fill="#14532d">status: approved / rejected</text>
  <text x="460" y="634" text-anchor="middle" font-size="11" fill="#14532d">ai_report · human_decisions · feedback stored</text>

  <!-- Feedback loop arrow back to DB -->
  <path d="M 280 610 Q 140 610 140 450 Q 140 195 175 195" fill="none" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-green)"/>
  <text x="95" y="400" text-anchor="middle" font-size="9" fill="#22c55e" transform="rotate(-90 95 400)">status updated</text>

  <!-- ════════════════════════════════════════════════════════════
       FOOTER — TECH STACK
  ════════════════════════════════════════════════════════════ -->
  <rect x="0" y="695" width="920" height="65" fill="#0f172a"/>

  <text x="30" y="718" font-size="10" font-weight="600" fill="#475569" letter-spacing="0.8">STACK</text>

  <!-- Google ADK -->
  <rect x="90" y="704" width="115" height="26" rx="13" fill="#1d4ed8"/>
  <text x="147" y="721" text-anchor="middle" font-size="10" font-weight="600" fill="white">Google ADK</text>

  <!-- Gemini -->
  <rect x="215" y="704" width="150" height="26" rx="13" fill="#1d4ed8"/>
  <text x="290" y="721" text-anchor="middle" font-size="10" font-weight="600" fill="white">Gemini 2.0 Flash</text>

  <!-- Streamlit -->
  <rect x="375" y="704" width="90" height="26" rx="13" fill="#ff4b4b"/>
  <text x="420" y="721" text-anchor="middle" font-size="10" font-weight="600" fill="white">Streamlit</text>

  <!-- SQLite -->
  <rect x="475" y="704" width="80" height="26" rx="13" fill="#0369a1"/>
  <text x="515" y="721" text-anchor="middle" font-size="10" font-weight="600" fill="white">SQLite</text>

  <!-- Python -->
  <rect x="565" y="704" width="100" height="26" rx="13" fill="#16a34a"/>
  <text x="615" y="721" text-anchor="middle" font-size="10" font-weight="600" fill="white">Python 3.11</text>

  <!-- Pattern label -->
  <rect x="675" y="704" width="220" height="26" rx="13" fill="#374151"/>
  <text x="785" y="721" text-anchor="middle" font-size="10" fill="#9ca3af">Pattern: Human-in-the-Loop (HITL)</text>

  <!-- Copyright line -->
  <text x="460" y="750" text-anchor="middle" font-size="9" fill="#334155">
    Campaign Validator Agent — Multi-Agent HITL System
  </text>

</svg>
