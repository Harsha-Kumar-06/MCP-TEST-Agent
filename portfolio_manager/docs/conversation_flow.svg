<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1750">
  <defs>
    <style>
      .phase1-box { fill: #f0f9ff; stroke: #0ea5e9; stroke-width: 2; }
      .phase2-box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .question-box { fill: #e0e7ff; stroke: #6366f1; stroke-width: 2; }
      .user-box { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .profile-box { fill: #fce7f3; stroke: #ec4899; stroke-width: 2; }
      .agent-box { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .output-box { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .text { font-family: 'Arial', sans-serif; font-size: 13px; fill: #1f2937; }
      .title-text { font-family: 'Arial', sans-serif; font-size: 15px; font-weight: bold; fill: #1f2937; }
      .small-text { font-family: 'Arial', sans-serif; font-size: 11px; fill: #4b5563; }
      .tiny-text { font-family: 'Arial', sans-serif; font-size: 10px; fill: #6b7280; }
      .arrow { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .user-arrow { stroke: #16a34a; stroke-width: 2; fill: none; marker-end: url(#arrowhead-green); }
      .agent-arrow { stroke: #7c3aed; stroke-width: 2; fill: none; marker-end: url(#arrowhead-purple); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#16a34a" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7c3aed" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" class="title-text" font-size="18">Portfolio Manager - Conversation Flow</text>
  <text x="500" y="50" text-anchor="middle" class="small-text">2-Phase Conversational Portfolio Generation</text>

  <!-- PHASE 1 -->
  <rect x="50" y="80" width="900" height="720" rx="10" class="phase1-box" fill-opacity="0.1"/>
  <text x="500" y="110" text-anchor="middle" class="title-text" font-size="16">PHASE 1: Profile Collection (Conversational)</text>

  <!-- Step 1: Greeting -->
  <rect x="100" y="140" width="350" height="70" rx="6" class="question-box"/>
  <text x="275" y="165" text-anchor="middle" class="text">🤖 Agent Greeting</text>
  <text x="275" y="183" text-anchor="middle" class="small-text">"Hello! I'm your AI Portfolio Manager.</text>
  <text x="275" y="197" text-anchor="middle" class="small-text">How much would you like to invest?"</text>

  <path d="M 330 210 L 330 240" class="agent-arrow"/>

  <!-- Step 2: User Response - Capital -->
  <rect x="550" y="240" width="350" height="50" rx="6" class="user-box"/>
  <text x="725" y="263" text-anchor="middle" class="text">👤 User Response</text>
  <text x="725" y="279" text-anchor="middle" class="small-text">"$10,000"</text>

  <path d="M 580 265 L 450 265 L 450 310" class="user-arrow"/>

  <!-- Step 3: Question - Goal -->
  <rect x="100" y="310" width="350" height="80" rx="6" class="question-box"/>
  <text x="275" y="335" text-anchor="middle" class="text">🤖 Question: Investment Goal</text>
  <text x="275" y="353" text-anchor="middle" class="small-text">"What's your primary investment goal?"</text>
  <text x="275" y="367" text-anchor="middle" class="tiny-text">1. Preserve capital (low risk)</text>
  <text x="275" y="379" text-anchor="middle" class="tiny-text">2. Generate income | 3. Balanced growth</text>

  <path d="M 330 390 L 330 420" class="agent-arrow"/>

  <!-- Step 4: User Response - Goal -->
  <rect x="550" y="420" width="350" height="50" rx="6" class="user-box"/>
  <text x="725" y="443" text-anchor="middle" class="text">👤 User Response</text>
  <text x="725" y="459" text-anchor="middle" class="small-text">"Balanced growth"</text>

  <path d="M 580 445 L 450 445 L 450 490" class="user-arrow"/>

  <!-- Step 5: Question - Time Horizon -->
  <rect x="100" y="490" width="350" height="80" rx="6" class="question-box"/>
  <text x="275" y="515" text-anchor="middle" class="text">🤖 Question: Time Horizon</text>
  <text x="275" y="533" text-anchor="middle" class="small-text">"How long do you plan to invest?"</text>
  <text x="275" y="547" text-anchor="middle" class="tiny-text">1. &lt;1 year | 2. 1-3 years | 3. 3-5 years</text>
  <text x="275" y="559" text-anchor="middle" class="tiny-text">4. 5-10 years | 5. 10+ years</text>

  <path d="M 330 570 L 330 600" class="agent-arrow"/>

  <!-- Step 6: User Response - Horizon -->
  <rect x="550" y="600" width="350" height="50" rx="6" class="user-box"/>
  <text x="725" y="623" text-anchor="middle" class="text">👤 User Response</text>
  <text x="725" y="639" text-anchor="middle" class="small-text">"5-10 years"</text>

  <path d="M 580 625 L 450 625 L 450 670" class="user-arrow"/>

  <!-- Step 7: Question - Risk Tolerance -->
  <rect x="100" y="670" width="350" height="60" rx="6" class="question-box"/>
  <text x="275" y="693" text-anchor="middle" class="text">🤖 Question: Risk Tolerance</text>
  <text x="275" y="709" text-anchor="middle" class="small-text">"Maximum acceptable loss?"</text>
  <text x="275" y="723" text-anchor="middle" class="tiny-text">5% | 10% | 15% | 20% | 30%+</text>

  <path d="M 275 730 L 275 760" class="agent-arrow"/>

  <!-- Step 8: Profile Complete -->
  <rect x="100" y="760" width="800" height="40" rx="6" class="profile-box"/>
  <text x="500" y="785" text-anchor="middle" class="text">✅ Profile Collection Complete (6 data points collected)</text>

  <!-- PHASE 2 -->
  <rect x="50" y="850" width="900" height="850" rx="10" class="phase2-box" fill-opacity="0.1"/>
  <text x="500" y="880" text-anchor="middle" class="title-text" font-size="16">PHASE 2: Portfolio Generation (Automated Pipeline)</text>

  <path d="M 500 800 L 500 900" class="arrow"/>

  <!-- Step 9: Confirmation -->
  <rect x="100" y="900" width="800" height="55" rx="6" class="question-box"/>
  <text x="500" y="923" text-anchor="middle" class="text">🤖 Confirmation Request</text>
  <text x="500" y="939" text-anchor="middle" class="small-text">"I have your complete profile (Risk Score: 6/10 - Moderate).</text>
  <text x="500" y="951" text-anchor="middle" class="small-text">Ready to generate your personalized portfolio?"</text>

  <path d="M 650 955 L 650 985" class="arrow"/>

  <!-- Step 10: User Confirms -->
  <rect x="550" y="985" width="350" height="40" rx="6" class="user-box"/>
  <text x="725" y="1010" text-anchor="middle" class="text">👤 "Yes, please proceed!"</text>

  <path d="M 580 1005 L 500 1005 L 500 1045" class="user-arrow"/>

  <!-- Step 11: Agent Transfer -->
  <rect x="150" y="1045" width="700" height="50" rx="6" class="agent-box"/>
  <text x="500" y="1068" text-anchor="middle" class="text">🔄 Root Agent Transfers to Analysis Pipeline</text>
  <text x="500" y="1082" text-anchor="middle" class="tiny-text">Passes user_profile JSON to SequentialAgent</text>

  <path d="M 500 1095 L 500 1125" class="agent-arrow"/>

  <!-- Step 12: Sequential Pipeline -->
  <rect x="100" y="1125" width="800" height="420" rx="8" class="agent-box" fill-opacity="0.3"/>
  <text x="500" y="1150" text-anchor="middle" class="title-text">Sequential Agent Pipeline</text>

  <!-- Agent 1 -->
  <rect x="130" y="1170" width="120" height="55" rx="5" class="agent-box"/>
  <text x="190" y="1192" text-anchor="middle" class="small-text">1. Macro Agent</text>
  <text x="190" y="1206" text-anchor="middle" class="tiny-text">Economic analysis</text>
  <text x="190" y="1218" text-anchor="middle" class="tiny-text">→ macro_outlook</text>

  <path d="M 250 1197 L 280 1197" class="arrow"/>

  <!-- Agent 2 -->
  <rect x="280" y="1170" width="120" height="55" rx="5" class="agent-box"/>
  <text x="340" y="1192" text-anchor="middle" class="small-text">2. Sector Agent</text>
  <text x="340" y="1206" text-anchor="middle" class="tiny-text">Sector selection</text>
  <text x="340" y="1218" text-anchor="middle" class="tiny-text">→ top_sectors</text>

  <path d="M 400 1197 L 430 1197" class="arrow"/>

  <!-- Agent 3 -->
  <rect x="430" y="1170" width="120" height="55" rx="5" class="agent-box"/>
  <text x="490" y="1192" text-anchor="middle" class="small-text">3. Stock Agent</text>
  <text x="490" y="1206" text-anchor="middle" class="tiny-text">Stock picks</text>
  <text x="490" y="1218" text-anchor="middle" class="tiny-text">→ selected_stocks</text>

  <path d="M 550 1197 L 580 1197" class="arrow"/>

  <!-- Agent 4 -->
  <rect x="580" y="1170" width="120" height="55" rx="5" class="agent-box"/>
  <text x="640" y="1192" text-anchor="middle" class="small-text">4. Portfolio Agent</text>
  <text x="640" y="1206" text-anchor="middle" class="tiny-text">Allocation</text>
  <text x="640" y="1218" text-anchor="middle" class="tiny-text">→ portfolio</text>

  <path d="M 700 1197 L 730 1197" class="arrow"/>

  <!-- Agent 5 -->
  <rect x="730" y="1170" width="120" height="55" rx="5" class="agent-box"/>
  <text x="790" y="1192" text-anchor="middle" class="small-text">5. Performance</text>
  <text x="790" y="1206" text-anchor="middle" class="tiny-text">Metrics calc</text>
  <text x="790" y="1218" text-anchor="middle" class="tiny-text">→ performance</text>

  <path d="M 790 1225 L 790 1255" class="arrow"/>

  <!-- Agent 6 -->
  <rect x="730" y="1255" width="120" height="55" rx="5" class="agent-box"/>
  <text x="790" y="1277" text-anchor="middle" class="small-text">6. Backtest Agent</text>
  <text x="790" y="1291" text-anchor="middle" class="tiny-text">12-mo validation</text>
  <text x="790" y="1303" text-anchor="middle" class="tiny-text">→ backtest_results</text>

  <path d="M 730 1282 L 550 1282" class="arrow"/>

  <!-- Agent 7 -->
  <rect x="430" y="1255" width="120" height="55" rx="5" class="agent-box"/>
  <text x="490" y="1277" text-anchor="middle" class="small-text">7. Report Agent</text>
  <text x="490" y="1291" text-anchor="middle" class="tiny-text">Final synthesis</text>
  <text x="490" y="1303" text-anchor="middle" class="tiny-text">→ final_report</text>

  <path d="M 490 1310 L 490 1340" class="arrow"/>

  <!-- Output -->
  <rect x="280" y="1340" width="440" height="60" rx="6" class="output-box"/>
  <text x="500" y="1363" text-anchor="middle" class="title-text">Complete Portfolio Package</text>
  <text x="500" y="1379" text-anchor="middle" class="small-text">Stocks + Allocations + Performance Metrics</text>
  <text x="500" y="1392" text-anchor="middle" class="small-text">+ Backtest Results + Investment Report</text>

  <!-- Tools Usage Note -->
  <g transform="translate(130, 1420)">
    <rect x="0" y="0" width="740" height="110" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="370" y="20" text-anchor="middle" class="text">⚙️ Tools Called During Pipeline:</text>
    <text x="370" y="38" text-anchor="middle" class="tiny-text">• get_economic_indicators() - GDP, inflation, unemployment, rates</text>
    <text x="370" y="52" text-anchor="middle" class="tiny-text">• get_stock_quote() - Real-time prices</text>
    <text x="370" y="66" text-anchor="middle" class="tiny-text">• get_company_fundamentals() - P/E, revenue, margins</text>
    <text x="370" y="80" text-anchor="middle" class="tiny-text">• get_technical_indicators() - RSI, MACD, SMA</text>
    <text x="370" y="94" text-anchor="middle" class="tiny-text">• calculate_sharpe_ratio(), calculate_volatility(), calculate_beta()</text>
    <text x="370" y="106" text-anchor="middle" class="tiny-text">• get_historical_prices() - 12-month backtest data</text>
  </g>

  <path d="M 500 1545 L 500 1575" class="arrow"/>

  <!-- Step 13: Final Response -->
  <rect x="100" y="1575" width="800" height="85" rx="6" class="output-box"/>
  <text x="500" y="1600" text-anchor="middle" class="title-text">🤖 Agent Returns Final Report</text>
  <text x="500" y="1618" text-anchor="middle" class="small-text">Comprehensive markdown report with:</text>
  <text x="500" y="1632" text-anchor="middle" class="tiny-text">Portfolio Summary | Stock Details | Risk Analysis | Performance Metrics</text>
  <text x="500" y="1644" text-anchor="middle" class="tiny-text">Historical Backtest Results | Investment Recommendations</text>
  <text x="500" y="1656" text-anchor="middle" class="tiny-text">Expected Return: 12.5% | Sharpe Ratio: 1.35 | Volatility: 15.2%</text>

  <!-- Legend -->
  <g transform="translate(150, 1690)">
    <text x="0" y="0" class="title-text" font-size="14">Legend:</text>
    <rect x="0" y="10" width="60" height="20" rx="4" class="question-box"/>
    <text x="68" y="24" class="tiny-text">Agent Question</text>
    <rect x="180" y="10" width="60" height="20" rx="4" class="user-box"/>
    <text x="248" y="24" class="tiny-text">User Response</text>
    <rect x="360" y="10" width="60" height="20" rx="4" class="agent-box"/>
    <text x="428" y="24" class="tiny-text">Agent Process</text>
    <rect x="540" y="10" width="60" height="20" rx="4" class="output-box"/>
    <text x="608" y="24" class="tiny-text">Final Output</text>
  </g>
</svg>