<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1900">
  <defs>
    <style>
      .input-box { fill: #fce7f3; stroke: #ec4899; stroke-width: 2; }
      .agent1-box { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .agent2-box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .agent3-box { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .agent4-box { fill: #e0e7ff; stroke: #6366f1; stroke-width: 2; }
      .agent5-box { fill: #fae8ff; stroke: #a855f7; stroke-width: 2; }
      .agent6-box { fill: #fed7aa; stroke: #ea580c; stroke-width: 2; }
      .agent7-box { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .output-box { fill: #d1fae5; stroke: #059669; stroke-width: 3; }
      .text { font-family: 'Arial', sans-serif; font-size: 13px; fill: #1f2937; }
      .title-text { font-family: 'Arial', sans-serif; font-size: 15px; font-weight: bold; fill: #1f2937; }
      .small-text { font-family: 'Arial', sans-serif; font-size: 11px; fill: #4b5563; }
      .tiny-text { font-family: 'Arial', sans-serif; font-size: 10px; fill: #6b7280; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .data-arrow { stroke: #ec4899; stroke-width: 2; fill: none; marker-end: url(#arrowhead-pink); stroke-dasharray: 4,4; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto">
      <polygon points="0 0, 12 3, 0 6" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-pink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ec4899" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="title-text" font-size="18">Portfolio Manager - Sequential Pipeline</text>
  <text x="600" y="50" text-anchor="middle" class="small-text">7 Specialized Agents Running in Sequence to Avoid API Rate Limits</text>

  <!-- INPUT -->
  <rect x="250" y="80" width="700" height="90" rx="8" class="input-box"/>
  <text x="600" y="110" text-anchor="middle" class="title-text">INPUT: User Profile (from Phase 1)</text>
  <text x="600" y="128" text-anchor="middle" class="small-text">capital: $10,000 | goal: balanced_growth | horizon: 5-10 years</text>
  <text x="600" y="142" text-anchor="middle" class="small-text">risk_tolerance: 15% max loss | experience: intermediate</text>
  <text x="600" y="156" text-anchor="middle" class="small-text">Risk Score: 6/10 (Moderate) | income_stability: stable</text>

  <path d="M 600 170 L 600 200" class="arrow"/>

  <!-- AGENT 1: MACRO AGENT -->
  <rect x="100" y="200" width="1000" height="140" rx="8" class="agent1-box"/>
  <text x="180" y="230" text-anchor="start" class="title-text">Step 1: Macro Agent</text>
  
  <rect x="130" y="245" width="440" height="80" rx="6" class="agent1-box"/>
  <text x="350" y="268" text-anchor="middle" class="text">📊 Responsibilities:</text>
  <text x="350" y="284" text-anchor="middle" class="small-text">• Fetches economic indicators (GDP, CPI, unemployment)</text>
  <text x="350" y="298" text-anchor="middle" class="small-text">• Analyzes Federal Reserve interest rate policy</text>
  <text x="350" y="312" text-anchor="middle" class="small-text">• Assesses market sentiment (bullish/bearish)</text>

  <rect x="600" y="245" width="470" height="80" rx="6" class="output-box"/>
  <text x="835" y="268" text-anchor="middle" class="text">✅ Output: macro_outlook</text>
  <text x="835" y="284" text-anchor="middle" class="tiny-text">market_sentiment: "bullish"</text>
  <text x="835" y="296" text-anchor="middle" class="tiny-text">economic_condition: "moderate_growth"</text>
  <text x="835" y="308" text-anchor="middle" class="tiny-text">favored_sectors: ["Technology", "Healthcare"]</text>
  <text x="835" y="320" text-anchor="middle" class="tiny-text">avoid_sectors: ["Real Estate", "Utilities"]</text>

  <path d="M 600 340 L 600 370" class="arrow"/>

  <!-- AGENT 2: SECTOR AGENT -->
  <rect x="100" y="370" width="1000" height="140" rx="8" class="agent2-box"/>
  <text x="180" y="400" text-anchor="start" class="title-text">Step 2: Sector Agent</text>
  
  <rect x="130" y="415" width="440" height="80" rx="6" class="agent2-box"/>
  <text x="350" y="438" text-anchor="middle" class="text">🏢 Responsibilities:</text>
  <text x="350" y="454" text-anchor="middle" class="small-text">• Reads macro_outlook from previous agent</text>
  <text x="350" y="468" text-anchor="middle" class="small-text">• Analyzes sector performance correlations</text>
  <text x="350" y="482" text-anchor="middle" class="small-text">• Selects 3-5 sectors matching economic conditions</text>

  <rect x="600" y="415" width="470" height="80" rx="6" class="output-box"/>
  <text x="835" y="438" text-anchor="middle" class="text">✅ Output: top_sectors</text>
  <text x="835" y="454" text-anchor="middle" class="tiny-text">sectors: ["Information Technology", "Healthcare",</text>
  <text x="835" y="466" text-anchor="middle" class="tiny-text">"Consumer Discretionary", "Industrials"]</text>
  <text x="835" y="478" text-anchor="middle" class="tiny-text">rationale: "Tech favored in low-rate growth environment"</text>
  <text x="835" y="490" text-anchor="middle" class="tiny-text">sector_weights: {Tech: 35%, Healthcare: 25%, ...}</text>

  <path d="M 835 325 L 835 355 L 270 355 L 270 415" class="data-arrow"/>
  <text x="350" y="370" text-anchor="middle" class="tiny-text" fill="#ec4899">reads macro_outlook</text>

  <path d="M 600 510 L 600 540" class="arrow"/>

  <!-- AGENT 3: STOCK SELECTION -->
  <rect x="100" y="540" width="1000" height="160" rx="8" class="agent3-box"/>
  <text x="180" y="570" text-anchor="start" class="title-text">Step 3: Stock Selection Agent</text>
  
  <rect x="130" y="585" width="440" height="100" rx="6" class="agent3-box"/>
  <text x="350" y="608" text-anchor="middle" class="text">📈 Responsibilities:</text>
  <text x="350" y="624" text-anchor="middle" class="small-text">• Screens stocks from selected sectors</text>
  <text x="350" y="638" text-anchor="middle" class="small-text">• Analyzes fundamentals (P/E, revenue growth, margins)</text>
  <text x="350" y="652" text-anchor="middle" class="small-text">• Evaluates technical indicators (RSI, MACD, SMA)</text>
  <text x="350" y="666" text-anchor="middle" class="small-text">• Picks 8-12 quality stocks for portfolio</text>
  <text x="350" y="678" text-anchor="middle" class="tiny-text">⚠️ Rate limited: Sequential API calls to Alpha Vantage</text>

  <rect x="600" y="585" width="470" height="100" rx="6" class="output-box"/>
  <text x="835" y="608" text-anchor="middle" class="text">✅ Output: selected_stocks</text>
  <text x="835" y="624" text-anchor="middle" class="tiny-text">stocks: [</text>
  <text x="835" y="636" text-anchor="middle" class="tiny-text">{symbol: "AAPL", sector: "Tech", pe_ratio: 28.5,</text>
  <text x="835" y="648" text-anchor="middle" class="tiny-text">rev_growth: 12%, profit_margin: 25%, rsi: 62},</text>
  <text x="835" y="660" text-anchor="middle" class="tiny-text">{symbol: "MSFT", sector: "Tech", ...},</text>
  <text x="835" y="672" text-anchor="middle" class="tiny-text">{symbol: "UNH", sector: "Healthcare", ...}, ...]</text>

  <path d="M 835 495 L 835 525 L 270 525 L 270 585" class="data-arrow"/>
  <text x="350" y="540" text-anchor="middle" class="tiny-text" fill="#ec4899">reads top_sectors</text>

  <path d="M 600 700 L 600 730" class="arrow"/>

  <!-- AGENT 4: PORTFOLIO CONSTRUCTION -->
  <rect x="100" y="730" width="1000" height="150" rx="8" class="agent4-box"/>
  <text x="180" y="760" text-anchor="start" class="title-text">Step 4: Portfolio Construction Agent</text>
  
  <rect x="130" y="775" width="440" height="90" rx="6" class="agent4-box"/>
  <text x="350" y="798" text-anchor="middle" class="text">⚖️ Responsibilities:</text>
  <text x="350" y="814" text-anchor="middle" class="small-text">• Allocates $10,000 across selected stocks</text>
  <text x="350" y="828" text-anchor="middle" class="small-text">• Uses risk_score (6/10) for allocation strategy</text>
  <text x="350" y="842" text-anchor="middle" class="small-text">• Ensures diversification (max 20% per position)</text>
  <text x="350" y="856" text-anchor="middle" class="small-text">• Calculates share quantities and costs</text>

  <rect x="600" y="775" width="470" height="90" rx="6" class="output-box"/>
  <text x="835" y="798" text-anchor="middle" class="text">✅ Output: portfolio</text>
  <text x="835" y="814" text-anchor="middle" class="tiny-text">allocations: [</text>
  <text x="835" y="826" text-anchor="middle" class="tiny-text">{symbol: "AAPL", weight: 18%, shares: 12, value: $1,800},</text>
  <text x="835" y="838" text-anchor="middle" class="tiny-text">{symbol: "MSFT", weight: 15%, shares: 4, value: $1,500},</text>
  <text x="835" y="850" text-anchor="middle" class="tiny-text">{symbol: "UNH", weight: 12%, shares: 2, value: $1,200}, ...]</text>
  <text x="835" y="862" text-anchor="middle" class="tiny-text">total_value: $10,000 | cash_reserve: $50</text>

  <path d="M 835 685 L 835 715 L 270 715 L 270 775" class="data-arrow"/>
  <text x="350" y="730" text-anchor="middle" class="tiny-text" fill="#ec4899">reads selected_stocks + user_profile</text>

  <path d="M 600 880 L 600 910" class="arrow"/>

  <!-- AGENT 5: PERFORMANCE -->
  <rect x="100" y="910" width="1000" height="140" rx="8" class="agent5-box"/>
  <text x="180" y="940" text-anchor="start" class="title-text">Step 5: Performance Agent</text>
  
  <rect x="130" y="955" width="440" height="80" rx="6" class="agent5-box"/>
  <text x="350" y="978" text-anchor="middle" class="text">📊 Responsibilities:</text>
  <text x="350" y="994" text-anchor="middle" class="small-text">• Fetches historical prices for all stocks</text>
  <text x="350" y="1008" text-anchor="middle" class="small-text">• Calculates Sharpe ratio (risk-adjusted return)</text>
  <text x="350" y="1022" text-anchor="middle" class="small-text">• Computes volatility, beta, correlation matrix</text>

  <rect x="600" y="955" width="470" height="80" rx="6" class="output-box"/>
  <text x="835" y="978" text-anchor="middle" class="text">✅ Output: performance_report</text>
  <text x="835" y="994" text-anchor="middle" class="tiny-text">expected_annual_return: 12.5%</text>
  <text x="835" y="1006" text-anchor="middle" class="tiny-text">sharpe_ratio: 1.35 (good risk-adjusted return)</text>
  <text x="835" y="1018" text-anchor="middle" class="tiny-text">volatility: 15.2% (annualized)</text>
  <text x="835" y="1030" text-anchor="middle" class="tiny-text">portfolio_beta: 1.02 (market-like risk)</text>

  <path d="M 835 865 L 835 895 L 270 895 L 270 955" class="data-arrow"/>
  <text x="350" y="910" text-anchor="middle" class="tiny-text" fill="#ec4899">reads portfolio</text>

  <path d="M 600 1050 L 600 1080" class="arrow"/>

  <!-- AGENT 6: BACKTEST -->
  <rect x="100" y="1080" width="1000" height="150" rx="8" class="agent6-box"/>
  <text x="180" y="1110" text-anchor="start" class="title-text">Step 6: Backtest Agent</text>
  
  <rect x="130" y="1125" width="440" height="90" rx="6" class="agent6-box"/>
  <text x="350" y="1148" text-anchor="middle" class="text">⏪ Responsibilities:</text>
  <text x="350" y="1164" text-anchor="middle" class="small-text">• Fetches 12-month historical price data</text>
  <text x="350" y="1178" text-anchor="middle" class="small-text">• Simulates portfolio performance from 1 year ago</text>
  <text x="350" y="1192" text-anchor="middle" class="small-text">• Calculates actual return, drawdown, win rate</text>
  <text x="350" y="1206" text-anchor="middle" class="small-text">• Validates portfolio strategy against real data</text>

  <rect x="600" y="1125" width="470" height="90" rx="6" class="output-box"/>
  <text x="835" y="1148" text-anchor="middle" class="text">✅ Output: backtest_results</text>
  <text x="835" y="1164" text-anchor="middle" class="tiny-text">backtest_period: "2025-02-25 to 2026-02-25"</text>
  <text x="835" y="1176" text-anchor="middle" class="tiny-text">actual_return: 14.2% (outperformed S&amp;P 500: 11.8%)</text>
  <text x="835" y="1188" text-anchor="middle" class="tiny-text">max_drawdown: -8.3% (within 15% risk tolerance)</text>
  <text x="835" y="1200" text-anchor="middle" class="tiny-text">win_rate: 67% (8 of 12 months positive)</text>
  <text x="835" y="1212" text-anchor="middle" class="tiny-text">validation: "PASSED - Portfolio aligns with risk profile"</text>

  <path d="M 835 1035 L 835 1065 L 270 1065 L 270 1125" class="data-arrow"/>
  <text x="350" y="1080" text-anchor="middle" class="tiny-text" fill="#ec4899">reads portfolio + performance_report</text>

  <path d="M 600 1230 L 600 1260" class="arrow"/>

  <!-- AGENT 7: REPORT SYNTHESIZER -->
  <rect x="100" y="1260" width="1000" height="150" rx="8" class="agent7-box"/>
  <text x="180" y="1290" text-anchor="start" class="title-text">Step 7: Report Synthesizer Agent</text>
  
  <rect x="130" y="1305" width="440" height="90" rx="6" class="agent7-box"/>
  <text x="350" y="1328" text-anchor="middle" class="text">📝 Responsibilities:</text>
  <text x="350" y="1344" text-anchor="middle" class="small-text">• Aggregates all outputs from previous 6 agents</text>
  <text x="350" y="1358" text-anchor="middle" class="small-text">• Generates comprehensive markdown report</text>
  <text x="350" y="1372" text-anchor="middle" class="small-text">• Includes executive summary, tables, charts</text>
  <text x="350" y="1386" text-anchor="middle" class="small-text">• Provides actionable investment recommendations</text>

  <rect x="600" y="1305" width="470" height="90" rx="6" class="output-box"/>
  <text x="835" y="1328" text-anchor="middle" class="text">✅ Output: final_report</text>
  <text x="835" y="1344" text-anchor="middle" class="tiny-text">Markdown document with:</text>
  <text x="835" y="1356" text-anchor="middle" class="tiny-text">• Portfolio Summary (12 stocks, $10,000 invested)</text>
  <text x="835" y="1368" text-anchor="middle" class="tiny-text">• Risk Analysis (6/10 Moderate, 15.2% volatility)</text>
  <text x="835" y="1380" text-anchor="middle" class="tiny-text">• Performance Metrics (12.5% return, 1.35 Sharpe)</text>
  <text x="835" y="1392" text-anchor="middle" class="tiny-text">• Backtest Results (14.2% historical, -8.3% max DD)</text>

  <path d="M 835 1215 L 835 1245 L 270 1245 L 270 1305" class="data-arrow"/>
  <text x="300" y="1260" text-anchor="middle" class="tiny-text" fill="#ec4899">reads ALL previous outputs</text>

  <path d="M 600 1410 L 600 1440" class="arrow"/>

  <!-- FINAL OUTPUT -->
  <rect x="200" y="1440" width="800" height="100" rx="10" class="output-box"/>
  <text x="600" y="1470" text-anchor="middle" class="title-text" font-size="16">🎉 FINAL OUTPUT: Complete Portfolio Package</text>
  <text x="600" y="1490" text-anchor="middle" class="text">All structured JSON outputs + Comprehensive investment report</text>
  <text x="600" y="1506" text-anchor="middle" class="small-text">Ready to display in Web UI or return via A2A protocol</text>
  <text x="600" y="1522" text-anchor="middle" class="tiny-text">Total Pipeline Execution Time: ~60-90 seconds (rate-limited by Alpha Vantage API)</text>

  <!-- Execution Flow Note -->
  <g transform="translate(150, 1570)">
    <rect x="0" y="0" width="900" height="100" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="450" y="25" text-anchor="middle" class="title-text">⚡ Sequential Execution Pattern</text>
    <text x="450" y="43" text-anchor="middle" class="small-text">Each agent MUST complete before the next begins. No parallelization.</text>
    <text x="450" y="59" text-anchor="middle" class="tiny-text">Reason: Alpha Vantage Free Tier allows only 5 API calls per minute.</text>
    <text x="450" y="73" text-anchor="middle" class="tiny-text">Parallel execution would exceed rate limits and cause API errors.</text>
    <text x="450" y="87" text-anchor="middle" class="tiny-text">Current design ensures reliable execution within rate constraints.</text>
  </g>

  <!-- Data Flow Legend -->
  <g transform="translate(200, 1700)">
    <text x="0" y="0" class="title-text" font-size="14">Legend:</text>
    <line x1="0" y1="15" x2="60" y2="15" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="68" y="20" class="tiny-text">Agent Execution Flow</text>
    <line x1="250" y1="15" x2="310" y2="15" stroke="#ec4899" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowhead-pink)"/>
    <text x="318" y="20" class="tiny-text">Data Dependency (reads previous output)</text>
  </g>

  <!-- API Rate Limit Warning -->
  <g transform="translate(200, 1760)">
    <rect x="0" y="0" width="800" height="95" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="400" y="25" text-anchor="middle" class="title-text" fill="#991b1b">🚨 Critical: API Rate Limiting</text>
    <text x="400" y="43" text-anchor="middle" class="small-text" fill="#991b1b">Alpha Vantage Free Tier: 5 calls per minute, 500 calls per day</text>
    <text x="400" y="59" text-anchor="middle" class="tiny-text" fill="#991b1b">Each agent may make 3-8 API calls depending on portfolio size</text>
    <text x="400" y="73" text-anchor="middle" class="tiny-text" fill="#991b1b">Stock Selection Agent: ~12 calls (1 per stock candidate)</text>
    <text x="400" y="87" text-anchor="middle" class="tiny-text" fill="#991b1b">Sequential execution with built-in rate limiter prevents errors</text>
  </g>
</svg>