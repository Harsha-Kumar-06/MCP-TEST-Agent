<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1400">
  <defs>
    <style>
      .ui-box { fill: #f0f9ff; stroke: #0ea5e9; stroke-width: 2; }
      .api-box { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .agent-box { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .subagent-box { fill: #fae8ff; stroke: #a855f7; stroke-width: 2; }
      .tool-box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .data-box { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .text { font-family: 'Arial', sans-serif; font-size: 13px; fill: #1f2937; }
      .title-text { font-family: 'Arial', sans-serif; font-size: 15px; font-weight: bold; fill: #1f2937; }
      .small-text { font-family: 'Arial', sans-serif; font-size: 11px; fill: #4b5563; }
      .tiny-text { font-family: 'Arial', sans-serif; font-size: 10px; fill: #6b7280; }
      .arrow { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .bidirectional { stroke: #7c3aed; stroke-width: 2; fill: none; marker-end: url(#arrowhead-purple); marker-start: url(#arrowhead-purple-start); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#7c3aed" />
    </marker>
    <marker id="arrowhead-purple-start" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 10 6" fill="#7c3aed" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" class="title-text" font-size="18">Portfolio Manager - System Architecture</text>

  <!-- Layer 1: User Interface -->
  <rect x="50" y="60" width="1000" height="120" rx="8" class="ui-box"/>
  <text x="550" y="85" text-anchor="middle" class="title-text">User Interface Layer</text>
  
  <rect x="80" y="100" width="280" height="60" rx="6" class="ui-box"/>
  <text x="220" y="125" text-anchor="middle" class="text">Web UI (HTML/CSS/JS)</text>
  <text x="220" y="143" text-anchor="middle" class="small-text">Interactive portfolio builder</text>
  <text x="220" y="157" text-anchor="middle" class="tiny-text">Live chat + portfolio display</text>

  <rect x="410" y="100" width="280" height="60" rx="6" class="ui-box"/>
  <text x="550" y="125" text-anchor="middle" class="text">A2A Protocol Interface</text>
  <text x="550" y="143" text-anchor="middle" class="small-text">Agent-to-Agent communication</text>
  <text x="550" y="157" text-anchor="middle" class="tiny-text">/message:send endpoint</text>

  <rect x="740" y="100" width="280" height="60" rx="6" class="ui-box"/>
  <text x="880" y="125" text-anchor="middle" class="text">ADK Web UI</text>
  <text x="880" y="143" text-anchor="middle" class="small-text">Google ADK interface</text>
  <text x="880" y="157" text-anchor="middle" class="tiny-text">adk web command</text>

  <path d="M 220 180 L 220 210" class="arrow"/>
  <path d="M 550 180 L 550 210" class="arrow"/>
  <path d="M 880 180 L 880 210" class="arrow"/>

  <!-- Layer 2: API Server -->
  <rect x="50" y="210" width="1000" height="100" rx="8" class="api-box"/>
  <text x="550" y="235" text-anchor="middle" class="title-text">API Server Layer (FastAPI)</text>
  
  <rect x="100" y="250" width="350" height="45" rx="6" class="api-box"/>
  <text x="275" y="270" text-anchor="middle" class="text">/api/generate-portfolio</text>
  <text x="275" y="286" text-anchor="middle" class="tiny-text">POST - Creates portfolio from profile JSON</text>

  <rect x="500" y="250" width="250" height="45" rx="6" class="api-box"/>
  <text x="625" y="270" text-anchor="middle" class="text">/message:send</text>
  <text x="625" y="286" text-anchor="middle" class="tiny-text">POST - A2A protocol endpoint</text>

  <rect x="800" y="250" width="200" height="45" rx="6" class="api-box"/>
  <text x="900" y="270" text-anchor="middle" class="text">InMemoryRunner</text>
  <text x="900" y="286" text-anchor="middle" class="tiny-text">ADK session manager</text>

  <path d="M 275 310 L 275 340" class="arrow"/>
  <path d="M 625 310 L 625 340" class="arrow"/>
  <path d="M 900 310 L 900 340" class="arrow"/>

  <!-- Layer 3: Root Agent -->
  <rect x="50" y="340" width="1000" height="90" rx="8" class="agent-box"/>
  <text x="550" y="365" text-anchor="middle" class="title-text">Root Agent (LlmAgent - gemini-2.0-flash)</text>
  
  <rect x="150" y="380" width="800" height="35" rx="6" class="agent-box"/>
  <text x="550" y="395" text-anchor="middle" class="text">Conversational Portfolio Manager</text>
  <text x="550" y="408" text-anchor="middle" class="tiny-text">Collects profile → Delegates to analysis_pipeline → Returns final report</text>

  <path d="M 550 430 L 550 460" class="arrow"/>

  <!-- Layer 4: Analysis Pipeline -->
  <rect x="50" y="460" width="1000" height="320" rx="8" class="subagent-box"/>
  <text x="550" y="485" text-anchor="middle" class="title-text">Analysis Pipeline (SequentialAgent)</text>
  <text x="550" y="502" text-anchor="middle" class="small-text">7 specialized sub-agents run sequentially to avoid API rate limits</text>

  <!-- Sub-agents Grid -->
  <rect x="80" y="520" width="220" height="55" rx="6" class="subagent-box"/>
  <text x="190" y="540" text-anchor="middle" class="text">1. Macro Agent</text>
  <text x="190" y="555" text-anchor="middle" class="tiny-text">Economic analysis</text>
  <text x="190" y="567" text-anchor="middle" class="tiny-text">GDP, inflation, rates</text>

  <rect x="330" y="520" width="220" height="55" rx="6" class="subagent-box"/>
  <text x="440" y="540" text-anchor="middle" class="text">2. Sector Agent</text>
  <text x="440" y="555" text-anchor="middle" class="tiny-text">Sector selection</text>
  <text x="440" y="567" text-anchor="middle" class="tiny-text">Based on macro outlook</text>

  <rect x="580" y="520" width="220" height="55" rx="6" class="subagent-box"/>
  <text x="690" y="540" text-anchor="middle" class="text">3. Stock Agent</text>
  <text x="690" y="555" text-anchor="middle" class="tiny-text">Stock selection</text>
  <text x="690" y="567" text-anchor="middle" class="tiny-text">Fundamental + technical</text>

  <rect x="830" y="520" width="220" height="55" rx="6" class="subagent-box"/>
  <text x="940" y="540" text-anchor="middle" class="text">4. Portfolio Agent</text>
  <text x="940" y="555" text-anchor="middle" class="tiny-text">Capital allocation</text>
  <text x="940" y="567" text-anchor="middle" class="tiny-text">Risk-based weighting</text>

  <rect x="80" y="595" width="220" height="55" rx="6" class="subagent-box"/>
  <text x="190" y="615" text-anchor="middle" class="text">5. Performance Agent</text>
  <text x="190" y="630" text-anchor="middle" class="tiny-text">Sharpe, volatility, beta</text>
  <text x="190" y="642" text-anchor="middle" class="tiny-text">Return calculations</text>

  <rect x="330" y="595" width="220" height="55" rx="6" class="subagent-box"/>
  <text x="440" y="615" text-anchor="middle" class="text">6. Backtest Agent</text>
  <text x="440" y="630" text-anchor="middle" class="tiny-text">Historical validation</text>
  <text x="440" y="642" text-anchor="middle" class="tiny-text">12-month simulation</text>

  <rect x="580" y="595" width="220" height="55" rx="6" class="subagent-box"/>
  <text x="690" y="615" text-anchor="middle" class="text">7. Report Agent</text>
  <text x="690" y="630" text-anchor="middle" class="tiny-text">Final synthesis</text>
  <text x="690" y="642" text-anchor="middle" class="tiny-text">Markdown report</text>

  <!-- Sequential flow arrows -->
  <path d="M 300 547 L 330 547" class="arrow"/>
  <path d="M 550 547 L 580 547" class="arrow"/>
  <path d="M 800 547 L 830 547" class="arrow"/>
  <path d="M 940 575 L 940 595" class="arrow"/>
  <path d="M 940 622 L 800 622" class="arrow"/>
  <path d="M 550 622 L 330 622" class="arrow"/>
  <path d="M 210 622 L 80 622" class="arrow"/>

  <!-- Output box -->
  <rect x="830" y="670" width="220" height="50" rx="6" class="data-box"/>
  <text x="940" y="690" text-anchor="middle" class="text">Final Portfolio JSON</text>
  <text x="940" y="705" text-anchor="middle" class="tiny-text">Stocks, allocations, report</text>

  <path d="M 690 650 L 690 695 L 830 695" class="arrow"/>

  <path d="M 550 780 L 550 810" class="arrow"/>

  <!-- Layer 5: Tools & APIs -->
  <rect x="50" y="810" width="1000" height="150" rx="8" class="tool-box"/>
  <text x="550" y="835" text-anchor="middle" class="title-text">Tools &amp; API Integration Layer</text>

  <rect x="80" y="850" width="280" height="90" rx="6" class="tool-box"/>
  <text x="220" y="875" text-anchor="middle" class="text">Stock API (stock_api.py)</text>
  <text x="220" y="892" text-anchor="middle" class="small-text">• get_stock_quote()</text>
  <text x="220" y="906" text-anchor="middle" class="small-text">• get_company_fundamentals()</text>
  <text x="220" y="920" text-anchor="middle" class="small-text">• get_technical_indicators()</text>
  <text x="220" y="934" text-anchor="middle" class="small-text">• get_historical_prices()</text>

  <rect x="410" y="850" width="280" height="90" rx="6" class="tool-box"/>
  <text x="550" y="875" text-anchor="middle" class="text">Calculations (calculations.py)</text>
  <text x="550" y="892" text-anchor="middle" class="small-text">• calculate_sharpe_ratio()</text>
  <text x="550" y="906" text-anchor="middle" class="small-text">• calculate_volatility()</text>
  <text x="550" y="920" text-anchor="middle" class="small-text">• calculate_beta()</text>
  <text x="550" y="934" text-anchor="middle" class="small-text">• calculate_max_drawdown()</text>

  <rect x="740" y="850" width="280" height="90" rx="6" class="tool-box"/>
  <text x="880" y="875" text-anchor="middle" class="text">Macro Data (macro_data.py)</text>
  <text x="880" y="892" text-anchor="middle" class="small-text">• get_economic_indicators()</text>
  <text x="880" y="906" text-anchor="middle" class="small-text">• get_recession_indicators()</text>
  <text x="880" y="920" text-anchor="middle" class="small-text">• calculate_market_outlook()</text>

  <path d="M 220 960 L 220 990" class="arrow"/>
  <path d="M 880 960 L 880 990" class="arrow"/>

  <!-- Layer 6: External Data Sources -->
  <rect x="50" y="990" width="1000" height="100" rx="8" class="data-box"/>
  <text x="550" y="1015" text-anchor="middle" class="title-text">External Data Sources</text>

  <rect x="100" y="1030" width="300" height="45" rx="6" class="data-box"/>
  <text x="250" y="1050" text-anchor="middle" class="text">Alpha Vantage API</text>
  <text x="250" y="1065" text-anchor="middle" class="tiny-text">Real-time stock data &amp; fundamentals</text>

  <rect x="450" y="1030" width="200" height="45" rx="6" class="data-box"/>
  <text x="550" y="1050" text-anchor="middle" class="text">JSON Data Files</text>
  <text x="550" y="1065" text-anchor="middle" class="tiny-text">Risk profiles, sectors</text>

  <rect x="700" y="1030" width="300" height="45" rx="6" class="data-box"/>
  <text x="850" y="1050" text-anchor="middle" class="text">Economic Data (Alpha Vantage)</text>
  <text x="850" y="1065" text-anchor="middle" class="tiny-text">GDP, inflation, unemployment, rates</text>

  <!-- Legend -->
  <g transform="translate(100, 1130)">
    <text x="0" y="0" class="title-text" font-size="14">Legend:</text>
    <rect x="0" y="10" width="70" height="20" rx="4" class="ui-box"/>
    <text x="78" y="24" class="tiny-text">User Interface</text>
    <rect x="180" y="10" width="70" height="20" rx="4" class="api-box"/>
    <text x="258" y="24" class="tiny-text">API Server</text>
    <rect x="350" y="10" width="70" height="20" rx="4" class="agent-box"/>
    <text x="428" y="24" class="tiny-text">Root Agent</text>
    <rect x="0" y="40" width="70" height="20" rx="4" class="subagent-box"/>
    <text x="78" y="54" class="tiny-text">Sub-Agents</text>
    <rect x="180" y="40" width="70" height="20" rx="4" class="tool-box"/>
    <text x="258" y="54" class="tiny-text">Tools/Functions</text>
    <rect x="350" y="40" width="70" height="20" rx="4" class="data-box"/>
    <text x="428" y="54" class="tiny-text">Data Sources</text>
  </g>

  <!-- Rate Limiting Note -->
  <g transform="translate(620, 1150)">
    <rect x="0" y="0" width="380" height="55" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="190" y="20" text-anchor="middle" class="text" fill="#991b1b">⚠️ API Rate Limiting</text>
    <text x="190" y="36" text-anchor="middle" class="tiny-text" fill="#991b1b">Alpha Vantage Free Tier:</text>
    <text x="190" y="48" text-anchor="middle" class="tiny-text" fill="#991b1b">5 calls/minute, 500 calls/day</text>
  </g>

  <!-- Connection lines from tools to agents -->
  <path d="M 190 720 L 190 810" class="bidirectional" stroke-dasharray="4,4"/>
  <path d="M 440 720 L 550 810" class="bidirectional" stroke-dasharray="4,4"/>
  <path x="M 690 720 L 550 810" class="bidirectional" stroke-dasharray="4,4"/>
  <path d="M 940 720 L 880 810" class="bidirectional" stroke-dasharray="4,4"/>

  <text x="550" y="1370" text-anchor="middle" class="tiny-text" fill="#6b7280">Data flows top-to-bottom (user requests) and bottom-to-top (responses)</text>
</svg>